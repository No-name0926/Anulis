<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Anulis - Focus Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #0070bc;
            --accent: #00c6ff;
            --bg: #f2f7fb;
            --card: #ffffff;
            --text: #333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, "Hiragino Sans", sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

        /* --- ホーム（一覧）画面 --- */
        #homeView { height: 100vh; overflow-y: auto; padding: 60px 20px 100px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .logo { font-size: 26px; font-weight: 900; color: var(--primary); letter-spacing: -0.5px; }
        .add-btn { width: 48px; height: 48px; border-radius: 16px; background: var(--accent); color: white; border: none; font-size: 28px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,198,255,0.3); }

        .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: white; border-radius: 22px; padding: 18px; box-shadow: 0 8px 20px rgba(0,0,0,0.04); border: 1px solid rgba(255,255,255,0.8); cursor: pointer; transition: transform 0.2s; }
        .card:active { transform: scale(0.96); }
        .card-t { font-size: 14px; font-weight: 700; height: 3.2em; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; margin-bottom: 8px; }
        .bar-bg { height: 6px; background: #eee; border-radius: 3px; overflow: hidden; }
        .bar-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); transition: width 0.6s ease; }

        /* --- 詳細（スナップ）画面 --- */
        #detailView { display: none; position: fixed; inset: 0; background: white; z-index: 1000; }
        .snap-x { display: flex; overflow-x: scroll; scroll-snap-type: x mandatory; width: 100vw; height: 100vh; scroll-behavior: smooth; }
        .snap-x::-webkit-scrollbar { display: none; }

        .chart-container { min-width: 100vw; height: 100vh; scroll-snap-align: start; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .chart-container::-webkit-scrollbar { display: none; }

        /* セクション：グラフ（上） */
        .section-graph { height: 100vh; scroll-snap-align: start; display: flex; flex-direction: column; padding: 70px 20px 30px; }
        /* セクション：カレンダー（下） */
        .section-cal { height: 100vh; scroll-snap-align: start; background: var(--bg); padding: 80px 20px; }

        .back-btn { position: fixed; top: 50px; left: 20px; z-index: 1100; font-size: 28px; border: none; background: none; color: #aaa; cursor: pointer; }

        /* グラフエリア */
        .graph-area { flex: 1; position: relative; margin-bottom: 15px; }
        .advice-card { background: #eaf6ff; padding: 18px; border-radius: 20px; font-size: 13px; color: var(--primary); font-weight: 600; line-height: 1.6; }

        /* カレンダーエリア */
        .cal-box { background: white; border-radius: 25px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .cal-head { display: flex; justify-content: space-between; font-weight: 800; margin-bottom: 20px; color: var(--primary); }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; text-align: center; }
        .d-cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 14px; position: relative; }
        .d-cell.active-day { background: #f0f7ff; color: var(--primary); font-weight: bold; }
        .d-cell.selected { background: var(--primary) !important; color: white !important; }
        .d-cell.has-data::after { content: ''; position: absolute; bottom: 5px; width: 4px; height: 4px; background: var(--accent); border-radius: 50%; }

        .record-form { background: white; border-radius: 25px; padding: 25px; margin-top: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .input-wrap { display: flex; align-items: center; gap: 12px; margin-top: 15px; }
        input { flex: 1; border: 2px solid #f0f0f0; padding: 15px; border-radius: 15px; font-size: 16px; outline: none; transition: border-color 0.3s; }
        input:focus { border-color: var(--accent); }
        .save-btn { background: var(--primary); color: white; border: none; padding: 15px 25px; border-radius: 15px; font-weight: bold; }

        /* 作成モーダル */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 2000; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(8px); }
        .modal-inner { background: white; width: 100%; max-width: 400px; border-radius: 30px; padding: 30px; animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div id="homeView">
        <div class="header">
            <div class="logo">Anulis</div>
            <button class="add-btn" onclick="openModal()">＋</button>
        </div>
        <div class="chart-grid" id="chartGrid"></div>
    </div>

    <div id="detailView">
        <button class="back-btn" onclick="closeDetail()">✕</button>
        <div class="snap-x" id="snapXContainer">
            </div>
    </div>

    <div class="modal" id="createModal">
        <div class="modal-inner">
            <h2 style="margin-bottom:20px; font-size:18px;">新しいペースメーカー</h2>
            <div style="margin-bottom:15px">
                <label style="font-size:12px; color:#999">教材名・目標</label>
                <input type="text" id="m_name" placeholder="例: 数学I 青チャート" style="width:100%">
            </div>
            <div style="margin-bottom:15px">
                <label style="font-size:12px; color:#999">完了期日</label>
                <input type="date" id="m_date" style="width:100%">
            </div>
            <div style="display:flex; gap:10px">
                <div style="flex:2">
                    <label style="font-size:12px; color:#999">目標総数</label>
                    <input type="number" id="m_total" placeholder="300">
                </div>
                <div style="flex:1">
                    <label style="font-size:12px; color:#999">単位</label>
                    <select id="m_unit" style="width:100%; padding:15px; border-radius:15px; border:2px solid #f0f0f0; background:white;">
                        <option>問</option><option>ページ</option><option>章</option>
                    </select>
                </div>
            </div>
            <button class="add-btn" style="width:100%; margin-top:25px; font-size:16px;" onclick="addChart()">作成する</button>
            <button onclick="closeModal()" style="width:100%; border:none; background:none; color:#bbb; margin-top:15px; font-size:14px;">キャンセル</button>
        </div>
    </div>

    <script>
        let charts = JSON.parse(localStorage.getItem('anulis_v5_data')) || [];
        let chartInstances = {};

        function openModal() { document.getElementById('createModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('createModal').style.display = 'none'; }

        function addChart() {
            const name = document.getElementById('m_name').value;
            const date = document.getElementById('m_date').value;
            const total = parseInt(document.getElementById('m_total').value);
            const unit = document.getElementById('m_unit').value;
            if(!name || !date || !total) return;

            const startStr = new Date().toISOString().split('T')[0];
            const newChart = {
                id: 'id' + Date.now(),
                name, deadline: date, total, unit,
                startDate: startStr,
                records: { [startStr]: 0 } // 初期値
            };
            charts.push(newChart);
            save(); renderHome(); closeModal();
        }

        function save() { localStorage.setItem('anulis_v5_data', JSON.stringify(charts)); }

        function renderHome() {
            const grid = document.getElementById('chartGrid');
            grid.innerHTML = '';
            charts.forEach(c => {
                const dates = Object.keys(c.records).sort();
                const latest = c.records[dates[dates.length-1]] || 0;
                const perc = Math.min(100, Math.round((latest / c.total) * 100));
                grid.innerHTML += `
                    <div class="card" onclick="openDetail('${c.id}')">
                        <div class="card-t">${c.name}</div>
                        <div style="font-size:10px; color:#999; margin-bottom:5px;">進捗: ${perc}%</div>
                        <div class="bar-bg"><div class="bar-fill" style="width:${perc}%"></div></div>
                    </div>
                `;
            });
        }

        function openDetail(id) {
            const container = document.getElementById('snapXContainer');
            container.innerHTML = '';
            document.getElementById('detailView').style.display = 'block';

            charts.forEach(c => {
                const page = document.createElement('div');
                page.className = 'chart-container';
                page.id = `view-${c.id}`;
                page.innerHTML = `
                    <section class="section-graph">
                        <h2 style="font-size:22px; font-weight:900; margin-bottom:5px;">${c.name}</h2>
                        <div style="font-size:12px; color:#999; margin-bottom:20px;">残り作業量の推移</div>
                        <div class="graph-area"><canvas id="canvas-${c.id}"></canvas></div>
                        <div class="advice-card" id="advice-${c.id}">計算中...</div>
                        <div style="text-align:center; margin-top:25px; color:#ddd; font-size:11px;">記録は下にスクロール ↓</div>
                    </section>
                    <section class="section-cal">
                        <div class="cal-box">
                            <div class="cal-head"><div>${new Date().getFullYear()}年 ${new Date().getMonth()+1}月</div></div>
                            <div class="cal-grid" id="grid-${c.id}"></div>
                        </div>
                        <div class="record-form">
                            <div id="label-${c.id}" style="font-weight:bold; color:var(--primary);">日付を選択してください</div>
                            <div class="input-wrap">
                                <input type="number" id="input-${c.id}" placeholder="現在の累計数">
                                <span style="font-weight:bold">${c.unit}</span>
                                <button class="save-btn" onclick="saveProgress('${c.id}')">保存</button>
                            </div>
                            <div style="font-size:11px; color:#aaa; margin-top:10px;">※その日の「最終的な累計数」を入力してください。</div>
                        </div>
                        <button onclick="deleteChart('${c.id}')" style="width:100%; margin-top:30px; border:none; background:none; color:#ff7675; font-size:12px;">チャートを削除する</button>
                    </section>
                `;
                container.appendChild(page);
                renderGraph(c);
                renderCal(c);
            });
            document.getElementById(`view-${id}`).scrollIntoView();
        }

        function closeDetail() { document.getElementById('detailView').style.display = 'none'; renderHome(); }

        function renderGraph(c) {
            const ctx = document.getElementById(`canvas-${c.id}`).getContext('2d');
            const sortedDates = Object.keys(c.records).sort();
            const latestVal = c.records[sortedDates[sortedDates.length-1]];
            
            // 理想線データ
            const ideal = [c.total, 0];
            // 実績データ (右下がり: 残り量)
            const actualPoints = [
                { x: '開始', y: c.total },
                { x: '現在', y: Math.max(0, c.total - latestVal) }
            ];

            if(chartInstances[c.id]) chartInstances[c.id].destroy();
            chartInstances[c.id] = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['開始', '目標期日'],
                    datasets: [{
                        data: [{x:'開始', y:c.total}, {x:'現在', y:c.total - latestVal}],
                        borderColor: '#0070bc',
                        backgroundColor: 'rgba(0,112,188,0.1)',
                        fill: true, tension: 0.3, borderWidth: 4, pointRadius: 6, pointBackgroundColor: '#fff', pointBorderWidth: 3
                    }, {
                        data: [{x:'開始', y:c.total}, {x:'目標期日', y:0}],
                        borderColor: '#ddd', borderDash: [6, 6], fill: false, pointRadius: 0
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { type: 'category', grid: { display: false } },
                        y: { beginAtZero: true, max: c.total, ticks: { font: { size: 10 } } }
                    }
                }
            });

            // アドバイス
            const remain = c.total - latestVal;
            const days = Math.ceil((new Date(c.deadline) - new Date()) / 86400000);
            const pace = days > 0 ? Math.ceil(remain / days) : remain;
            document.getElementById(`advice-${c.id}`).innerHTML = 
                remain > 0 ? `残り ${remain}${c.unit}あります。期日まであと${Math.max(0, days)}日です。<br>今日から1日あたり「${pace}${c.unit}」ずつ進めましょう！` : "🎉 目標をすべて達成しました！";
        }

        function renderCal(c) {
            const grid = document.getElementById(`grid-${c.id}`);
            grid.innerHTML = '';
            const now = new Date();
            const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            const todayStr = now.toISOString().split('T')[0];

            for(let i=1; i<=lastDay; i++) {
                const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                const cell = document.createElement('div');
                cell.className = 'd-cell';
                if(dateStr === todayStr) cell.classList.add('active-day');
                if(c.records[dateStr] !== undefined) cell.classList.add('has-data');
                cell.textContent = i;
                cell.onclick = () => {
                    const all = grid.querySelectorAll('.d-cell');
                    all.forEach(a => a.classList.remove('selected'));
                    cell.classList.add('selected');
                    document.getElementById(`label-${c.id}`).innerText = `${dateStr} の記録を更新`;
                    document.getElementById(`input-${c.id}`).value = c.records[dateStr] || "";
                    document.getElementById(`input-${c.id}`).dataset.selected = dateStr;
                };
                grid.appendChild(cell);
            }
        }

        function saveProgress(id) {
            const input = document.getElementById(`input-${id}`);
            const dateStr = input.dataset.selected;
            if(!dateStr) return alert("カレンダーから日付を選択してください");
            
            const val = parseInt(input.value);
            const c = charts.find(x => x.id === id);
            c.records[dateStr] = val;
            save();
            renderGraph(c);
            renderCal(c);
            confetti({ particleCount: 50, spread: 70, origin: { y: 0.9 } });
        }

        function deleteChart(id) {
            if(!confirm("このチャートを削除してもよろしいですか？")) return;
            charts = charts.filter(x => x.id !== id);
            save();
            closeDetail();
            renderHome();
        }

        renderHome();
    </script>
</body>
</html>
