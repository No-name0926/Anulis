<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Anulis - 学習ペースメーカー</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-color: #0070bc;
            --accent-color: #00c6ff;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --card-bg: rgba(255, 255, 255, 0.85);
            --text-main: #333;
            --text-sub: #777;
            --safe-color: #10b981; /* 進捗が良い時の色 */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            padding-bottom: 100px;
        }

        /* ヘッダー */
        .top-nav {
            padding: 50px 20px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-text { font-size: 24px; font-weight: 800; color: var(--primary-color); }

        .add-btn-round {
            background: var(--accent-color);
            color: white; border: none;
            width: 44px; height: 44px; border-radius: 14px;
            font-size: 24px; cursor: pointer;
            box-shadow: 0 4px 12px rgba(0,198,255,0.3);
        }

        /* チャートリスト */
        .container { padding: 15px; }
        .chart-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .chart-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.6);
            backdrop-filter: blur(10px);
            cursor: pointer;
        }

        .card-title { font-size: 15px; font-weight: 700; margin-bottom: 5px; }
        .card-info { font-size: 11px; color: var(--text-sub); margin-bottom: 10px; }

        .progress-container {
            height: 6px; background: rgba(0,0,0,0.05);
            border-radius: 3px; overflow: hidden; margin-bottom: 4px;
        }
        .progress-fill {
            height: 100%; background: linear-gradient(90deg, var(--primary-color), var(--accent-color));
            transition: width 0.8s ease;
        }
        .progress-label { font-size: 10px; text-align: right; font-weight: 600; }

        /* モーダル (チャート作成) */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(6px);
            z-index: 2000; justify-content: center; align-items: center;
            padding: 20px;
        }
        .modal-window {
            background: white; width: 100%; max-width: 380px;
            border-radius: 28px; padding: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        }

        .form-group { margin-bottom: 15px; }
        .form-label { font-size: 13px; color: var(--text-sub); margin-bottom: 6px; display: block; }
        .form-input {
            width: 100%; padding: 12px; border-radius: 12px;
            border: 1px solid #eee; background: #f9f9f9; font-size: 16px; outline: none;
        }

        .submit-btn {
            width: 100%; padding: 14px; background: var(--primary-color);
            color: white; border: none; border-radius: 12px;
            font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 10px;
        }

        /* 詳細画面 */
        .detail-view {
            display: none; position: fixed; inset: 0;
            background: var(--bg-gradient); z-index: 1000;
            overflow-y: auto; padding: 50px 0;
        }
        .detail-header { display: flex; align-items: center; padding: 0 20px; margin-bottom: 20px; }
        
        .detail-card {
            background: white; border-radius: 24px; padding: 20px;
            margin: 0 15px 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        /* カレンダーUI */
        .calendar-tools { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .cal-btn { background: none; border: none; font-size: 20px; color: var(--primary-color); padding: 5px 10px; }
        
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            text-align: center;
            font-size: 12px;
        }
        .cal-day-head { font-weight: bold; color: #999; padding-bottom: 5px; }
        .cal-day {
            padding: 10px 0; border-radius: 50%; cursor: pointer;
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
        }
        .cal-day.empty { cursor: default; }
        .cal-day.selected { background: var(--primary-color); color: white; font-weight: bold; }
        .cal-day.today { border: 2px solid var(--primary-color); color: var(--primary-color); font-weight: bold; }
        .cal-day.has-record { position: relative; }
        .cal-day.has-record::after {
            content: ''; position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%);
            width: 4px; height: 4px; background: var(--safe-color); border-radius: 50%;
        }
        .cal-day.selected.has-record::after { background: white; }

        /* 進捗入力エリア */
        .record-input-group {
            display: flex; gap: 10px; align-items: center;
            background: #f8f9fa; padding: 15px; border-radius: 15px; margin-top: 15px;
        }

        /* 下部タブ */
        .bottom-tab {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 70px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid rgba(0,0,0,0.05); padding-bottom: 10px; z-index: 100;
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <div class="logo-text">Anulis</div>
        <button class="add-btn-round" onclick="openModal()">＋</button>
    </div>

    <div class="container">
        <h2 style="margin-bottom: 15px; font-size: 20px;">学習ペースメーカー</h2>
        <div class="chart-grid" id="chartGrid">
            </div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal-window">
            <h3 style="margin-bottom: 20px; text-align: center; font-size: 18px;">新規チャート作成</h3>
            <div class="form-group">
                <label class="form-label">チャート名 (書籍名など)</label>
                <input type="text" id="m_name" class="form-input" placeholder="例: 英単語 Target 1900">
            </div>
            <div class="form-group">
                <label class="form-label">完了させる期日</label>
                <input type="date" id="m_date" class="form-input">
            </div>
            <div style="display: flex; gap: 10px;">
                <div style="flex: 2;">
                    <label class="form-label">全体の目標量</label>
                    <input type="number" id="m_total" class="form-input" placeholder="1900">
                </div>
                <div style="flex: 1;">
                    <label class="form-label">単位</label>
                    <select id="m_unit" class="form-input">
                        <option>問</option>
                        <option>ページ</option>
                        <option>章</option>
                    </select>
                </div>
            </div>
            <button class="submit-btn" onclick="saveNewChart()">ペースメーカーを作成</button>
            <button onclick="closeModal()" style="width:100%; border:none; background:none; margin-top:15px; color:#aaa; cursor:pointer;">キャンセル</button>
        </div>
    </div>

    <div class="detail-view" id="detailView">
        <div class="detail-header">
            <button onclick="closeDetail()" style="background:none; border:none; font-size: 24px; cursor:pointer; margin-right: 15px;">←</button>
            <h2 id="d_title" style="font-size: 18px;">タイトル</h2>
        </div>
        
        <div class="detail-card" style="padding: 10px;">
            <div style="height: 220px;">
                <canvas id="burnDownChart"></canvas>
            </div>
        </div>

        <div class="detail-card">
            <div class="calendar-tools">
                <button class="cal-btn" onclick="changeMonth(-1)">＜</button>
                <div id="cal_month_year" style="font-weight: bold;">2023年10月</div>
                <button class="cal-btn" onclick="changeMonth(1)">＞</button>
            </div>
            <div class="calendar-grid" id="calendarGrid">
                </div>

            <div class="record-input-group">
                <div style="flex: 1;">
                    <div style="font-size: 12px; color: #666; margin-bottom: 4px;" id="record_date_label">10/26 の成果</div>
                    <div style="display: flex; align-items: baseline; gap: 5px;">
                        <span style="font-size: 12px; color: #999;">ここまで</span>
                        <input type="number" id="record_val" class="form-input" style="padding: 8px; width: 80px;" placeholder="0">
                        <span id="d_unit_label" style="font-size: 14px;">問</span>
                        <span style="font-size: 12px; color: #999;">進んだ</span>
                    </div>
                </div>
                <button class="submit-btn" style="margin:0; width: 80px; padding: 10px;" onclick="saveProgressForDate()">保存</button>
            </div>
            
            <p id="pace_advice" style="margin-top: 15px; font-size: 13px; color: var(--primary-color); font-weight: 600; text-align: center; line-height: 1.5;"></p>
        </div>
        
        <button onclick="deleteChart()" style="width:100%; padding:15px; background:none; border:none; color:#ff7675; cursor:pointer; margin-bottom: 20px;">このチャートを削除する</button>
    </div>

    <div class="bottom-tab">
        <div style="color: var(--primary-color); font-size: 26px;">⌂</div>
        <div style="color: #ccc; font-size: 26px;">○</div>
        <div style="color: #ccc; font-size: 26px;">⚇</div>
    </div>

    <script>
        let charts = JSON.parse(localStorage.getItem('anulis_burndown_data')) || [];
        let currentId = null;
        let chartInstance = null;
        let selectedDateStr = new Date().toISOString().split('T')[0]; // 初期選択は今日
        let currentCalDate = new Date(); // カレンダーが表示している月

        function openModal() { document.getElementById('modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        function saveNewChart() {
            const name = document.getElementById('m_name').value;
            const date = document.getElementById('m_date').value;
            const total = parseInt(document.getElementById('m_total').value);
            const unit = document.getElementById('m_unit').value;

            if(!name || !date || isNaN(total)) return alert('全ての項目を正しく入力してください');

            const today = new Date().toISOString().split('T')[0];
            const newChart = {
                id: Date.now(),
                name,
                deadline: date,
                total,
                unit,
                createdAt: today,
                // 日付ごとの進捗レコード。キー: 日付, 値: 累計進捗
                records: {} 
            };
            // 作成日(今日)の進捗を0として初期化
            newChart.records[today] = 0;

            charts.push(newChart);
            updateStorage();
            renderList();
            closeModal();
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#0070bc', '#00c6ff'] });
        }

        function renderList() {
            const grid = document.getElementById('chartGrid');
            grid.innerHTML = '';
            charts.forEach(c => {
                // 最新の進捗を取得
                const progressDates = Object.keys(c.records).sort();
                const latestDate = progressDates[progressDates.length - 1];
                const latestProgress = c.records[latestDate] || 0;

                const percent = Math.min(100, Math.round((latestProgress / c.total) * 100));
                const daysLeft = Math.ceil((new Date(c.deadline) - new Date()) / (1000 * 60 * 60 * 24));

                const card = document.createElement('div');
                card.className = 'chart-card';
                card.onclick = () => openDetail(c.id);
                card.innerHTML = `
                    <div class="card-title">${c.name}</div>
                    <div class="card-info">あと ${Math.max(0, daysLeft)}日 | 目標: ${c.total}${c.unit}</div>
                    <div class="progress-container"><div class="progress-fill" style="width:${percent}%"></div></div>
                    <div class="progress-label">${percent}% 完了</div>
                `;
                grid.appendChild(card);
            });
        }

        function openDetail(id) {
            currentId = id;
            const c = charts.find(x => x.id === id);
            document.getElementById('d_title').textContent = c.name;
            document.getElementById('d_unit_label').textContent = c.unit;
            document.getElementById('detailView').style.display = 'block';
            
            selectedDateStr = new Date().toISOString().split('T')[0]; // 開いた時は今日を選択
            currentCalDate = new Date(); 

            renderCalendar(c);
            loadRecordForSelectedDate(c);
            updateAdvice(c);
            initBurnDownChart(c);
        }

        function closeDetail() { document.getElementById('detailView').style.display = 'none'; }

        // --- カレンダーロジック ---
        function renderCalendar(c) {
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';
            const year = currentCalDate.getFullYear();
            const month = currentCalDate.getMonth();
            
            document.getElementById('cal_month_year').textContent = `${year}年${month + 1}月`;

            // 曜日ヘッダー
            ['日','月','火','水','木','金','土'].forEach(h => {
                const el = document.createElement('div');
                el.className = 'cal-day-head';
                el.textContent = h;
                grid.appendChild(el);
            });

            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();
            const todayStr = new Date().toISOString().split('T')[0];

            // 1日までの空白
            for (let i = 0; i < firstDay; i++) {
                const el = document.createElement('div');
                el.className = 'cal-day empty';
                grid.appendChild(el);
            }

            // 日付
            for (let i = 1; i <= lastDate; i++) {
                const el = document.createElement('div');
                el.className = 'cal-day';
                el.textContent = i;
                
                // 日付文字列を作成 (YYYY-MM-DD)
                const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                
                if(dateStr === todayStr) el.classList.add('today');
                if(dateStr === selectedDateStr) el.classList.add('selected');
                if(c.records[dateStr] !== undefined) el.classList.add('has-record');

                el.onclick = () => selectDate(dateStr, c);
                grid.appendChild(el);
            }
        }

        function changeMonth(delta) {
            currentCalDate.setMonth(currentCalDate.getMonth() + delta);
            const c = charts.find(x => x.id === currentId);
            renderCalendar(c);
        }

        function selectDate(dateStr, c) {
            selectedDateStr = dateStr;
            renderCalendar(c);
            loadRecordForSelectedDate(c);
        }

        function loadRecordForSelectedDate(c) {
            const m = selectedDateStr.split('-')[1];
            const d = selectedDateStr.split('-')[2];
            document.getElementById('record_date_label').textContent = `${parseInt(m)}/${parseInt(d)} の進捗状況`;
            
            // その日の進捗があれば表示、なければ0
            const record = c.records[selectedDateStr] || 0;
            document.getElementById('record_val').value = record;
        }

        function saveProgressForDate() {
            let val = parseInt(document.getElementById('record_val').value);
            if(isNaN(val) || val < 0) val = 0;

            const c = charts.find(x => x.id === currentId);
            
            // 目標を超えないように制限
            if(val > c.total) val = c.total;

            // 選択した日付の進捗を「上書き」保存
            c.records[selectedDateStr] = val;

            updateStorage();
            renderCalendar(c);
            updateAdvice(c);
            initBurnDownChart(c); // グラフ更新
            renderList(); // リスト更新
            confetti({ particleCount: 30, spread: 50, origin: { y: 0.8 }, colors: ['#10b981'] });
        }

        // --- グラフ・アドバイスロジック ---
        function updateAdvice(c) {
            const today = new Date();
            const end = new Date(c.deadline);
            const diff = Math.ceil((end - today) / (1000 * 60 * 60 * 24));
            
            // 最新の進捗を取得
            const progressDates = Object.keys(c.records).sort();
            const latestDate = progressDates[progressDates.length - 1];
            const latestProgress = c.records[latestDate] || 0;

            const remain = Math.max(0, c.total - latestProgress);
            const pace = diff > 0 ? Math.ceil(remain / diff) : remain;
            
            let text = `残り: ${remain}${c.unit} (完了率: ${Math.round((latestProgress/c.total)*100)}%)<br>`;
            if(remain > 0) {
                text += `期日まであと${Math.max(0, diff)}日。今日以降、<br><span style="font-size:16px;">1日「${pace}${c.unit}」</span>ペースで完了します。`;
            } else {
                text += "<span style='color:#10b981; font-size:16px;'>🎉 目標達成！おめでとうございます！</span>";
            }
            document.getElementById('pace_advice').innerHTML = text;
        }

        function initBurnDownChart(c) {
            const ctx = document.getElementById('burnDownChart').getContext('2d');
            if(chartInstance) chartInstance.destroy();

            // データ準備
            const startDay = new Date(c.createdAt);
            const endDay = new Date(c.deadline);
            const totalDays = Math.ceil((endDay - startDay) / (1000 * 60 * 60 * 24));

            // X軸のラベル（開始日、中間、期日）
            const labels = [
                `${startDay.getMonth()+1}/${startDay.getDate()}(開始)`,
                '', '', '', // 中間
                `${endDay.getMonth()+1}/${endDay.getDate()}(期日)`
            ];

            // 理想線（右下がり）
            const idealData = [c.total];
            for(let i=1; i<=5; i++) {
                idealData.push(Math.max(0, Math.round(c.total - (c.total / 5) * i)));
            }

            // 実績データ（右下がり: 残り量）
            // 記録がある日付の「残り」を算出
            const sortedRecordDates = Object.keys(c.records).sort();
            
            // グラフには、開始、今日、期日の3点をプロットする簡易版
            const todayStr = new Date().toISOString().split('T')[0];
            const latestDate = sortedRecordDates[sortedRecordDates.length - 1];
            const latestProgress = c.records[latestDate] || 0;

            const actualData = [
                c.total, // 開始時
                Math.max(0, c.total - latestProgress), // 最新（今日時点）
                null // 期日（未来なのでnull）
            ];
            
            // 実績のX軸プロット位置調整（今日が全体のどの辺か）
            let todayIndex = labels.length - 1; 
            if(new Date() < endDay) {
                const daysPassed = Math.ceil((new Date() - startDay) / (1000*60*60*24));
                todayIndex = Math.min(labels.length -2, Math.floor((daysPassed / totalDays) * labels.length));
                todayIndex = Math.max(1, todayIndex);
            }
            
            const plotDataActual = new Array(labels.length).fill(null);
            plotDataActual[0] = c.total;
            plotDataActual[todayIndex] = Math.max(0, c.total - latestProgress);

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '残り量 (実績)',
                        data: plotDataActual,
                        borderColor: '#0070bc',
                        backgroundColor: 'rgba(0,112,188,0.1)',
                        fill: true, tension: 0.1, borderWidth: 3, pointRadius: 5, pointBackgroundColor: '#0070bc',
                        spanGaps: true // 点と点をつなぐ
                    }, {
                        label: '理想ペース',
                        data: idealData,
                        borderColor: '#ccc',
                        borderDash: [5, 5],
                        fill: false, tension: 0, pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } }, // 凡例非表示
                    scales: {
                        y: { 
                            beginAtZero: true, max: c.total,
                            title: { display: true, text: `残り (${c.unit})`, font: { size: 10 } },
                            ticks: { font: { size: 10 } }
                        },
                        x: { ticks: { font: { size: 10 } }, grid: { display: false } }
                    }
                }
            });
        }

        function deleteChart() {
            if(!confirm('このチャートを削除しますか？\nこれまでの記録もすべて消去されます。')) return;
            charts = charts.filter(x => x.id !== currentId);
            updateStorage();
            renderList();
            closeDetail();
        }

        function updateStorage() { localStorage.setItem('anulis_burndown_data', JSON.stringify(charts)); }

        // 初期ロード
        renderList();
    </script>
</body>
</html>
