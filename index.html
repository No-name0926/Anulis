<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Anulis - 学習ペースメーカー</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-color: #0070bc;
            --accent-color: #00c6ff;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --card-bg: rgba(255, 255, 255, 0.82);
            --text-main: #333;
            --text-sub: #777;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            padding-bottom: 100px;
        }

        /* ヘッダー周り (画像1の配置を再現) */
        .top-nav {
            padding: 50px 20px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .menu-icon { font-size: 24px; color: var(--primary-color); }
        .logo-text {
            font-size: 24px;
            font-weight: 800;
            color: var(--accent-color);
            letter-spacing: 1px;
        }

        .action-icons {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .grid-icon, .add-circle-btn {
            background: rgba(255,255,255,0.6);
            border-radius: 12px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.4);
            cursor: pointer;
            font-size: 20px;
            color: var(--primary-color);
        }

        .add-circle-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            box-shadow: 0 4px 15px rgba(0,198,255,0.3);
        }

        .page-title {
            padding: 0 20px 20px;
            font-size: 24px;
            font-weight: 700;
        }

        /* チャートリストのグリッド (画像2を再現) */
        .chart-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 0 15px;
        }

        .chart-card {
            background: var(--card-bg);
            border-radius: 18px;
            padding: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.04);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.5);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .card-bg-img {
            position: absolute;
            bottom: 0; right: 0;
            width: 60%; opacity: 0.1;
            z-index: 0;
        }

        .card-content { z-index: 1; }

        .card-title { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
        .card-info { font-size: 11px; color: var(--text-sub); line-height: 1.4; }

        .progress-box { margin-top: 10px; }
        .progress-bar-bg {
            height: 6px;
            background: rgba(0,0,0,0.05);
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--accent-color));
            border-radius: 3px;
            transition: width 0.6s ease;
        }
        .progress-text {
            text-align: right;
            font-size: 10px;
            margin-top: 4px;
            font-weight: 600;
        }

        /* モーダル (画像3の配置を再現) */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: flex-end; /* 下から出るアニメーション風 */
        }

        .modal-window {
            background: white;
            width: 100%;
            max-width: 450px;
            border-radius: 30px 30px 0 0;
            padding: 30px 25px;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
