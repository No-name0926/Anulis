<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2f9dff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
  <title>Anulis</title>
  <!-- Updated source bundle for full inline handoff -->
  <style>
    :root {
      --bg: #ecf7ff;
      --bg-deep: #d6eeff;
      --surface: rgba(255, 255, 255, 0.88);
      --surface-strong: rgba(255, 255, 255, 0.97);
      --line: rgba(47, 157, 255, 0.22);
      --text: #1f4f73;
      --text-soft: #4c7ea7;
      --accent: #2f9dff;
      --accent-deep: #0a71d1;
      --accent-soft: #9ed5ff;
      --accent-rgb: 47, 157, 255;
      --theme-pattern: repeating-linear-gradient(135deg, rgba(47,157,255,0.17) 0 5px, transparent 5px 12px);
      --shadow: 0 8px 28px rgba(47, 157, 255, 0.18);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Inter", "Noto Sans JP", "Hiragino Kaku Gothic ProN", -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      background:
        var(--theme-pattern),
        radial-gradient(800px 500px at 10% 5%, rgba(255,255,255,0.85) 0%, transparent 55%),
        linear-gradient(160deg, var(--bg) 0%, var(--bg-deep) 100%);
      background-size: 20px 20px, auto, auto;
    }

    .orb {
      position: fixed;
      border-radius: 999px;
      filter: blur(22px);
      pointer-events: none;
      z-index: -1;
      opacity: .65;
      animation: float 10s ease-in-out infinite;
    }

    .orb.a {
      width: 260px;
      height: 260px;
      left: -80px;
      top: 60px;
      background: radial-gradient(circle, rgba(var(--accent-rgb), 0.28) 0%, transparent 70%);
    }

    .orb.b {
      width: 320px;
      height: 320px;
      right: -100px;
      bottom: 60px;
      background: radial-gradient(circle, rgba(var(--accent-rgb), 0.18) 0%, transparent 70%);
      animation-delay: -3s;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(12px);
      }
    }

    .app {
      width: min(100%, 560px);
      margin: 0 auto;
      padding: 16px 14px 30px;
    }

    .auth-screen {
      width: min(100%, 560px);
      margin: 28px auto 0;
      padding: 0 14px;
      display: none;
    }

    .auth-gate {
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, rgba(246, 250, 255, .92), rgba(224, 236, 255, .9));
      backdrop-filter: blur(3px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 30;
    }

    .auth-gate.show {
      display: flex;
    }

    .auth-loader {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      border: 3px solid rgba(var(--accent-rgb), .22);
      border-top-color: rgba(var(--accent-rgb), .9);
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .auth-card {
      padding: 18px 16px;
      text-align: center;
    }

    .auth-title {
      font-size: 24px;
      font-weight: 760;
      color: var(--accent-deep);
      margin-bottom: 6px;
    }

    .auth-sub {
      color: var(--text-soft);
      font-size: 12.5px;
      margin-bottom: 14px;
    }

    .auth-btn {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 11px;
      margin-top: 8px;
      color: #fff;
      font-weight: 650;
      font-size: 13px;
      cursor: pointer;
    }

    .auth-btn.google {
      background: linear-gradient(135deg, #5393ff 0%, #3574ea 100%);
    }

    .auth-btn.twitter {
      background: linear-gradient(135deg, #59b8ff 0%, #2a98ef 100%);
    }

    .topbar {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      margin-bottom: 14px;
      gap: 8px;
    }

    .brand {
      text-align: center;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: .18em;
      color: var(--accent-deep);
      font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
      text-transform: uppercase;
      text-shadow: 0 0 16px rgba(var(--accent-rgb), 0.5), 0 2px 4px rgba(var(--accent-rgb), 0.18);
    }

    .brand-star {
      font-size: 13px;
      color: var(--accent);
      text-shadow: 0 0 6px rgba(var(--accent-rgb), 1), 0 0 14px rgba(var(--accent-rgb), 0.7), 0 0 28px rgba(var(--accent-rgb), 0.4);
      animation: starPulse 2.4s ease-in-out infinite;
      display: inline-block;
      vertical-align: middle;
      margin: 0 5px;
      position: relative;
      top: -1px;
    }

    @keyframes starPulse {
      0%, 100% { opacity: 0.6; transform: scale(0.88); }
      50% { opacity: 1; transform: scale(1.18); }
    }

    .glass {
      background: linear-gradient(155deg, rgba(255,255,255,0.94) 0%, rgba(255,255,255,0.78) 50%, rgba(var(--accent-rgb),0.06) 100%);
      border: 1.5px solid rgba(var(--accent-rgb), 0.25);
      border-radius: 20px;
      backdrop-filter: blur(22px);
      box-shadow: var(--shadow), inset 0 1.5px 0 rgba(255,255,255,0.95), inset 0 -1px 0 rgba(var(--accent-rgb),0.08);
      position: relative;
      isolation: isolate;
      overflow: hidden;
    }

    .glass::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 45%;
      border-radius: inherit;
      background: linear-gradient(180deg, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0) 100%);
      pointer-events: none;
      z-index: 0;
    }

    .icon-btn {
      border: 1px solid var(--line);
      background: var(--surface-strong);
      color: var(--accent-deep);
      border-radius: 10px;
      padding: 7px 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: transform .15s ease, box-shadow .2s ease, background .15s ease;
      box-shadow: 0 2px 10px rgba(var(--accent-rgb), 0.18);
    }

    .icon-btn:hover {
      background: rgba(var(--accent-rgb), 0.12);
      box-shadow: 0 4px 18px rgba(var(--accent-rgb), 0.28);
    }

    .icon-btn:active {
      transform: scale(0.95);
    }

    .list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .card {
      padding: 12px;
      border-radius: 14px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(120deg, rgba(255,255,255,0.55) 0%, rgba(255,255,255,0) 45%);
      border-radius: inherit;
      z-index: 0;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .chart-item {
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease;
    }

    .chart-item:active {
      transform: scale(.985);
    }

    .archive-item {
      cursor: default;
      opacity: .9;
    }

    .archive-actions {
      margin-top: 8px;
      display: flex;
      justify-content: flex-end;
    }

    .archive-restore-btn {
      border: 1px solid var(--line);
      background: var(--surface-strong);
      color: var(--accent-deep);
      border-radius: 10px;
      padding: 6px 10px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
    }

    .title {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent-deep);
      margin-bottom: 4px;
      letter-spacing: .03em;
    }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 4px;
    }

    .chart-chip {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .06em;
      padding: 3px 7px;
      border-radius: 999px;
      background: rgba(var(--accent-rgb), .14);
      color: var(--accent-deep);
      white-space: nowrap;
    }

    .card-accent {
      border-left: 3px solid rgba(var(--accent-rgb), 0.5);
      padding-left: 10px;
    }

    .meta {
      font-size: 11px;
      color: var(--text-soft);
      line-height: 1.45;
    }

    .meta .due-date {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-family: "Inter", "Noto Sans JP", sans-serif;
      letter-spacing: .08em;
      color: color-mix(in srgb, var(--accent-deep) 72%, #455f8d);
      font-weight: 700;
      font-size: 10px;
    }

    .meta .due-date::before,
    .meta .due-date::after {
      content: "★";
      font-size: 9px;
      color: rgba(var(--accent-rgb), .62);
      text-shadow: 0 0 8px rgba(var(--accent-rgb), .25);
    }

    .progress-track {
      margin-top: 8px;
      width: 100%;
      height: 4px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--accent) 16%, white);
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, rgba(var(--accent-rgb),.5) 0%, var(--accent) 100%);
      transition: width .35s ease;
      box-shadow: 0 0 8px rgba(var(--accent-rgb), 0.5);
    }

    .empty {
      text-align: center;
      padding: 42px 14px;
      color: var(--text-soft);
      font-size: 12.5px;
    }

    .primary {
      margin-top: 12px;
      width: 100%;
      border: none;
      border-radius: 11px;
      background: linear-gradient(135deg, rgba(var(--accent-rgb),.7) 0%, var(--accent) 100%);
      color: #fff;
      padding: 11px 10px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(var(--accent-rgb), 0.4), 0 0 0 1px rgba(var(--accent-rgb),.3);
      transition: transform .15s ease, box-shadow .15s ease;
    }

    .primary:hover {
      box-shadow: 0 6px 28px rgba(var(--accent-rgb), 0.55), 0 0 0 1px rgba(var(--accent-rgb),.4);
    }

    .primary:active {
      transform: translateY(1px);
    }

    .chart-screen {
      display: none;
    }

    .chart-head {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(var(--accent-rgb), 0.12);
    }

    .chart-name {
      text-align: center;
      font-size: 14px;
      font-weight: 650;
      color: var(--accent-deep);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .graph-wrap {
      padding: 12px 10px 8px;
      margin-bottom: 10px;
    }

    .graph-label {
      font-size: 11px;
      color: var(--text-soft);
      margin-bottom: 6px;
    }

    canvas {
      width: 100% !important;
      height: 320px !important;
      display: block;
    }

    .daily-hero {
      padding: 14px;
      margin-bottom: 10px;
      text-align: center;
      background: linear-gradient(140deg, rgba(var(--accent-rgb), 0.13) 0%, rgba(255, 255, 255, 0.85) 80%);
    }

    .daily-caption {
      font-size: 11px;
      font-weight: 700;
      margin-bottom: 6px;
      letter-spacing: .08em;
      font-family: "Inter", "Noto Sans JP", sans-serif;
      color: color-mix(in srgb, var(--accent-deep) 78%, #1f2c44);
      position: relative;
      display: inline-block;
      padding: 0 4px;
    }

    .daily-caption::after {
      content: "";
      position: absolute;
      left: 2px;
      right: 2px;
      bottom: -4px;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(var(--accent-rgb), .1), rgba(var(--accent-rgb), .52), rgba(var(--accent-rgb), .1));
    }

    .daily-big {
      font-size: 24px;
      font-weight: 800;
      color: var(--accent-deep);
      line-height: 1.15;
    }

    .progress-card {
      margin-bottom: 0;
      text-align: center;
      padding: 12px;
      background: linear-gradient(150deg, rgba(255, 255, 255, .92), rgba(var(--accent-rgb), .09));
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .kpi-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-soft);
      margin-bottom: 4px;
      letter-spacing: .08em;
    }

    .kpi-value {
      font-size: 24px;
      font-weight: 800;
      color: var(--accent);
      line-height: 1.15;
    }

    .kpi-sub {
      font-size: 10.5px;
      color: var(--text-soft);
      margin-top: 4px;
    }

    .calendar-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 9px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(var(--accent-rgb), 0.14);
    }

    .month-label {
      font-size: 13px;
      font-weight: 650;
      color: var(--accent-deep);
    }

    .week-row,
    .day-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      text-align: center;
    }

    .week-row {
      font-size: 10.5px;
      color: var(--text-soft);
      margin-bottom: 5px;
    }

    .day-btn {
      border: none;
      background: transparent;
      color: var(--text);
      font-size: 11.5px;
      width: 30px;
      height: 30px;
      margin: 1px auto;
      border-radius: 9px;
      cursor: pointer;
      transition: all .15s ease;
    }

    .day-btn:hover {
      background: rgba(var(--accent-rgb), .12);
    }

    .day-btn.other {
      color: color-mix(in srgb, var(--text-soft) 55%, white);
    }

    .day-btn.active {
      background: linear-gradient(135deg, var(--accent-soft) 0%, var(--accent) 100%);
      color: #fff;
      box-shadow: 0 5px 12px rgba(var(--accent-rgb), 0.28);
    }

    .day-btn.future {
      opacity: .42;
      cursor: not-allowed;
    }

    .record-line {
      margin-top: 8px;
      border-top: 1px solid var(--line);
      padding-top: 9px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 11px;
      color: var(--text-soft);
    }

    .record-input {
      width: 92px;
      border: none;
      border-bottom: 1.5px solid rgba(var(--accent-rgb), 0.4);
      background: transparent;
      color: var(--text);
      font-size: 20px;
      text-align: right;
      outline: none;
      padding: 1px 0;
    }

    .memo {
      width: 100%;
      margin-top: 8px;
      border: none;
      border-bottom: 1.5px solid rgba(var(--accent-rgb), 0.3);
      background: transparent;
      color: var(--text);
      font-size: 11px;
      padding: 8px 0;
      outline: none;
    }

    .save {
      margin-top: 9px;
      width: 100%;
      border: 1px solid var(--line);
      background: rgba(var(--accent-rgb), 0.08);
      color: var(--accent-deep);
      border-radius: 10px;
      padding: 9px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s ease;
    }

    .save:active {
      transform: scale(.99);
    }

    .save:hover {
      background: rgba(var(--accent-rgb), 0.14);
    }

    .swipe-hint {
      margin-top: 6px;
      text-align: center;
      font-size: 10.5px;
      color: var(--text-soft);
      animation: pulse 2s ease-in-out infinite;
      letter-spacing: .04em;
    }

    .archive-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      gap: 8px;
    }

    .archive-close {
      border: 1px solid var(--line);
      background: var(--surface-strong);
      border-radius: 10px;
      padding: 4px 9px;
      font-size: 11px;
      cursor: pointer;
      color: var(--text-soft);
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: .55;
      }

      50% {
        opacity: 1;
      }
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(32, 53, 92, 0.28);
      backdrop-filter: blur(4px);
      display: none;
      flex-direction: column;
      justify-content: flex-end;
      align-items: stretch;
      z-index: 20;
    }

    .modal-box {
      width: min(100%, 560px);
      margin: 0 auto;
      background: var(--surface-strong);
      border-top-left-radius: 18px;
      border-top-right-radius: 18px;
      border: 1px solid var(--line);
      border-bottom: none;
      padding: 15px;
      animation: popup .2s ease;
    }

    @keyframes popup {
      from {
        transform: translateY(24px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      font-size: 13px;
      color: var(--text);
      background: rgba(255,255,255,0.06);
    }

    .field {
      margin-bottom: 10px;
    }

    .label {
      font-size: 10px;
      color: var(--text-soft);
      margin-bottom: 4px;
      display: block;
      letter-spacing: .08em;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .row-3 {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .unit-custom {
      display: none;
      margin-top: 8px;
    }

    .unit-custom.show {
      display: block;
    }

    .theme-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 6px;
      margin-top: 8px;
    }

    .theme-btn {
      border: 1.5px solid var(--line);
      border-radius: 12px;
      padding: 9px 4px;
      background: var(--surface);
      color: var(--text);
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s ease;
      line-height: 1;
    }

    .theme-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 4px 12px rgba(var(--accent-rgb), 0.22);
    }

    .theme-btn.active {
      border-color: var(--accent);
      background: rgba(var(--accent-rgb), 0.14);
      box-shadow: 0 0 0 2px rgba(var(--accent-rgb), 0.28);
    }

    .mini-canvas {
      width: 100% !important;
      height: 90px !important;
      display: block;
      margin-top: 8px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.38);
      border: 1px solid rgba(var(--accent-rgb), 0.15);
    }

    .chart-switch-out-left {
      animation: switchOutLeft .2s ease forwards;
    }

    .chart-switch-out-right {
      animation: switchOutRight .2s ease forwards;
    }

    .chart-switch-in-left {
      animation: switchInLeft .24s ease forwards;
    }

    .chart-switch-in-right {
      animation: switchInRight .24s ease forwards;
    }

    @keyframes switchOutLeft {
      to {
        opacity: 0;
        transform: translateX(-20px);
      }
    }

    @keyframes switchOutRight {
      to {
        opacity: 0;
        transform: translateX(20px);
      }
    }

    @keyframes switchInLeft {
      from {
        opacity: 0;
        transform: translateX(20px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes switchInRight {
      from {
        opacity: 0;
        transform: translateX(-20px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }
  </style>
</head>

<body>
  <div class="orb a"></div>
  <div class="orb b"></div>

  <div id="authScreen" class="auth-screen">
    <div class="glass auth-card">
      <div class="auth-title">Anulis</div>
      <div class="auth-sub">Google / X(Twitter) でログインして記録を同期</div>
      <button class="auth-btn google" onclick="loginWithGoogle()">Google でログイン</button>
      <button class="auth-btn twitter" onclick="loginWithTwitter()">X(Twitter) でログイン</button>

    </div>
  </div>

  <div id="authGate" class="auth-gate show">
    <div class="auth-loader" aria-label="loading"></div>
  </div>

  <div class="app" style="display:none;">
    <div id="homeScreen">
      <div class="topbar">
        <button class="icon-btn" onclick="openSettingsModal()">☰</button>
        <div class="brand"><span class="brand-star" aria-hidden="true">✦</span>Anulis<span class="brand-star" aria-hidden="true" style="animation-delay:1.2s;">✦</span></div>
        <div style="display:flex; gap:6px; justify-content:flex-end;">
          <button id="installBtn" class="icon-btn" style="display:none;" onclick="installApp()">⬇︎ インストール</button>
          <button class="icon-btn" onclick="openCreateModal()">＋ 新規</button>
        </div>
      </div>
      <div id="chartList" class="list"></div>
      <div id="archiveSection" class="glass card" style="display:none; margin-top:10px;">
        <div class="archive-head">
          <div class="title">アーカイブ</div>
          <button id="archiveCloseBtn" class="archive-close" onclick="toggleArchiveSection()">閉じる</button>
        </div>
        <div id="archiveList" class="list"></div>
      </div>
      <div id="emptyState" class="glass card empty" style="display:none;">チャートがありません。<br>「＋ 新規」から作成してください。</div>
    </div>

    function applyTheme(themeName) {
      const key = themes[themeName] ? themeName : 'blue';
      const theme = themes[key];
      const root = document.documentElement;
      root.style.setProperty('--bg', theme.bg);
      root.style.setProperty('--bg-deep', theme.bgDeep);
      root.style.setProperty('--line', theme.line);
      root.style.setProperty('--text', theme.text);
      root.style.setProperty('--text-soft', theme.textSoft);
      root.style.setProperty('--accent', theme.accent);
      root.style.setProperty('--accent-deep', theme.accentDeep);
      root.style.setProperty('--accent-soft', theme.accentSoft);
      root.style.setProperty('--accent-rgb', theme.accentRgb);
      root.style.setProperty('--theme-pattern', theme.pattern);
      root.style.setProperty('--shadow', `0 8px 28px rgba(${theme.accentRgb}, 0.18)`);
      document.body.style.backgroundImage = [
        theme.pattern,
        'radial-gradient(800px 500px at 10% 5%, rgba(255,255,255,0.75) 0%, transparent 55%)',
        `linear-gradient(160deg, ${theme.bg} 0%, ${theme.bgDeep} 100%)`
      ].join(',');
      document.body.style.backgroundSize = '20px 20px, auto, auto';
      localStorage.setItem('anulisTheme', key);
      if (!currentChart) renderList();
      if (currentChart) updateChartUI();
      queueCloudSave(300);
      document.querySelectorAll('.theme-btn').forEach((btn) => {
        btn.classList.toggle('active', btn.dataset.theme === key);
      });
    }

    let themePageCurrent = 0;
    const THEMES_PER_PAGE = 8;

    function renderThemeButtons() {
      const grid = document.getElementById('themeGrid');
      const pagerLabel = document.getElementById('themePagerLabel');
      const prevBtn = document.getElementById('themePrevBtn');
      const nextBtn = document.getElementById('themeNextBtn');
      if (!grid) return;
      const keys = Object.keys(themes);
      const totalPages = Math.ceil(keys.length / THEMES_PER_PAGE);
      const start = themePageCurrent * THEMES_PER_PAGE;
      const pageKeys = keys.slice(start, start + THEMES_PER_PAGE);
      const cur = localStorage.getItem('anulisTheme') || 'blue';
      grid.innerHTML = pageKeys.map(k =>
        `<button class="theme-btn${k === cur ? ' active' : ''}" data-theme="${k}" onclick="applyTheme('${k}')">${themes[k].label}</button>`
      ).join('');
      if (pagerLabel) pagerLabel.textContent = `${themePageCurrent + 1} / ${totalPages}`;
      if (prevBtn) prevBtn.disabled = themePageCurrent === 0;
      if (nextBtn) nextBtn.disabled = themePageCurrent >= totalPages - 1;
      if (!localStorage.getItem('anulisTheme')) applyTheme('blue');
    }

    window.themePageChange = function(dir) {
      const total = Math.ceil(Object.keys(themes).length / THEMES_PER_PAGE);
      themePageCurrent = Math.max(0, Math.min(total - 1, themePageCurrent + dir));
      renderThemeButtons();
    };

      document.getElementById('settingsModal').style.display = 'flex';

    function persistLocalMeta() {
      localStorage.setItem(LOCAL_META_KEY, JSON.stringify(localMeta));
    }

    function queueCloudSave(delay = 900) {
      clearTimeout(cloudSaveTimer);
      cloudSaveTimer = setTimeout(() => {
        saveCloudData();
      }, delay);
    }

    function saveLocalData({ dirty = true } = {}) {
      localStorage.setItem('anulisCharts', JSON.stringify(charts));
      localStorage.setItem('anulisTheme', localStorage.getItem('anulisTheme') || 'blue');
      if (dirty) {
        localMeta.updatedAt = Date.now();
        localMeta.pendingSync = true;
        persistLocalMeta();
        queueCloudSave();
      }
    }

    function saveViewState() {
      const state = {
        currentChartId: currentChart ? currentChart.id : null,
        selectedDate: currentChart ? toDateInputValue(selectedDate) : null,
        calendarBase: currentChart ? toDateInputValue(calendarBase) : null
      };
      localStorage.setItem(VIEW_STATE_KEY, JSON.stringify(state));
    }

    function clearViewState() {
      localStorage.removeItem(VIEW_STATE_KEY);
    }

    function restoreViewStateIfNeeded() {
      if (restoredViewState) return;
      restoredViewState = true;
      try {
        const raw = localStorage.getItem(VIEW_STATE_KEY);
        if (!raw) return;
        const state = JSON.parse(raw);
        if (!state?.currentChartId) return;
        const chart = charts.find((c) => c.id === state.currentChartId && !c.archived);
        if (!chart) return;
        showChart(chart.id, {
          selectedDate: state.selectedDate,
          calendarBase: state.calendarBase
        });
      } catch (e) {
        console.warn('view state restore failed', e);
      }
    }

    async function saveCloudData() {
      if (!firebaseReady || !currentUser || !db) return;
      if (typeof navigator !== 'undefined' && navigator.onLine === false) return;
      const username = currentUser.displayName || 'user';
      try {
        await db.ref(`users/${currentUser.uid}`).set({
          username,
          charts,
          theme: localStorage.getItem('anulisTheme') || 'blue',
          updatedAt: localMeta.updatedAt || Date.now()
        });
        localMeta.pendingSync = false;
        persistLocalMeta();
      } catch (e) {
        console.warn('cloud save failed', e);
      }
    }

    async function loadCloudData() {
      if (!firebaseReady || !currentUser || !db) return;
      try {
        const snap = await db.ref(`users/${currentUser.uid}`).once('value');
        const data = snap.val();
        if (data && typeof data === 'object') {
          const cloudUpdatedAt = Number(data.updatedAt) || 0;
          const shouldKeepLocal = localMeta.pendingSync || localMeta.updatedAt > cloudUpdatedAt;
          if (shouldKeepLocal) {
            await saveCloudData();
          } else {
            charts = Array.isArray(data.charts) ? data.charts : [];
            if (data.theme) localStorage.setItem('anulisTheme', data.theme);
            localMeta.updatedAt = cloudUpdatedAt;
            localMeta.pendingSync = false;
            persistLocalMeta();
            saveLocalData({ dirty: false });
          }
        } else {
          // クラウドが空なら、既存ローカルデータを初回同期
          await saveCloudData();
        }
      } catch (e) {
        console.warn('cloud load failed', e);
      }
    }

    async function initFirebaseAuth() {
      if (!window.firebase || !isFirebaseConfigured()) {
        setSignedInUI(true);
        return;
      }
      const wasSignedIn = localStorage.getItem('anulisSignedIn') === '1';
      if (wasSignedIn) {
        setSignedInUI(true);
        showAuthGate(false);
      } else {
        showAuthGate(true);
      }
      firebase.initializeApp(firebaseConfig);
      if (firebase.analytics) firebase.analytics();
      auth = firebase.auth();
      db = firebase.database();
      firebaseReady = true;
      authGateTimer = setTimeout(() => showAuthGate(false), wasSignedIn ? 2200 : 1200);
      auth.onAuthStateChanged(async (user) => {
        clearTimeout(authResolveTimer);
        currentUser = user;
        if (user) {
          localStorage.setItem('anulisSignedIn', '1');
          clearTimeout(authGateTimer);
          setSignedInUI(true);
          await loadCloudData();
          renderThemeButtons();
          renderList();
          restoreViewStateIfNeeded();
        } else {
          localStorage.setItem('anulisSignedIn', '0');
          const delay = wasSignedIn ? 2600 : 450;
          clearTimeout(authGateTimer);
          authResolveTimer = setTimeout(() => {
            setSignedInUI(false);
            showAuthGate(false);
          }, delay);
        }
      });
    }

    async function loginWithGoogle() {
      if (!auth) return alert('Firebase設定を先に入れてください');
      const provider = new firebase.auth.GoogleAuthProvider();
      try {
        await auth.signInWithPopup(provider);
      } catch (e) {
        if (e.code === 'auth/unauthorized-domain') {
          showAuthSetupHelp('Google');
          return;
        }
        if (
          e.code === 'auth/popup-blocked' ||
          e.code === 'auth/popup-closed-by-user' ||
          e.code === 'auth/operation-not-supported-in-this-environment'
        ) {
          await auth.signInWithRedirect(provider);
          return;
        }
        alert(`Googleログイン失敗: ${e.message}`);
      }
    }

    function formatKey(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function formatJa(date) {
      return `${date.getMonth() + 1}月${date.getDate()}日`;
    }

    function parseLocalDate(dateLike) {
      if (typeof dateLike === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(dateLike)) {
        const [y, m, d] = dateLike.split('-').map(Number);
        return new Date(y, m - 1, d);
      }
      return new Date(dateLike);
    }

    function normalizeDay(dateLike) {
      const d = parseLocalDate(dateLike);
      return new Date(d.getFullYear(), d.getMonth(), d.getDate());
    }

    function dayDiff(a, b) {
      return Math.floor((normalizeDay(a) - normalizeDay(b)) / 86400000);
    }

    function toDateInputValue(dateLike) {
      return formatKey(normalizeDay(dateLike));
    }

    function getChartStart(chart) {
      return normalizeDay(chart.startDate || chart.createdAt || new Date());
    }

    function getChartEnd(chart) {
      return normalizeDay(chart.endDate || chart.deadline || chart.createdAt || new Date());
    }

    function openCreateModal() {
      document.getElementById('createModal').style.display = 'flex';
      const start = normalizeDay(new Date());
      const end = new Date(start);
      end.setDate(end.getDate() + 7);
      document.getElementById('startInput').value = toDateInputValue(start);
      document.getElementById('endInput').value = toDateInputValue(end);

    function toggleCustomUnit() {

    function createChart() {
      const name = document.getElementById('nameInput').value.trim();
      const startDate = document.getElementById('startInput').value;
      const endDate = document.getElementById('endInput').value;
      const total = Number(document.getElementById('totalInput').value);
      const unitSel = document.getElementById('unitInput').value;
      const custom = document.getElementById('customUnit').value.trim();
      const unit = unitSel === 'custom' ? custom : unitSel;

      if (!name || !startDate || !endDate || !total || !unit) {
        alert('入力を確認してください');
        return;
      }
      if (normalizeDay(startDate) > normalizeDay(endDate)) {
        alert('入力を確認してください');
        return;
      }

      charts.push({
        id: Date.now(),
        name,
        startDate,
        endDate,
        total,
        unit,
        archived: false,
        createdAt: new Date().toISOString(),
        records: {}
      });

      saveLocalData();
      closeCreateModal();
      renderList();
    }

    function todayKey() {
      return formatKey(new Date());
    }

    function sanitizeChartRecords(chart) {
      if (!chart || !chart.records) return false;
      const now = todayKey();
      const startKey = toDateInputValue(getChartStart(chart));
      const endKey = toDateInputValue(getChartEnd(chart));
      let changed = false;
      Object.keys(chart.records).forEach((key) => {
        if (key > now || key < startKey || key > endKey) {
          delete chart.records[key];
          changed = true;
        }
      });
      return changed;
    }

    function computeProgress(chart) {
      const keys = Object.keys(chart.records || {}).sort();
      let done = 0;
      const history = [];
      const startKey = toDateInputValue(getChartStart(chart));
      const endKey = toDateInputValue(getChartEnd(chart));
      const nowKey = todayKey();

      keys.forEach((key) => {
        if (key < startKey || key > endKey || key > nowKey) return;
        done += Number(chart.records[key]?.amount || 0);
        if (done > chart.total) done = chart.total;
        history.push({ date: key, remaining: Math.max(0, chart.total - done) });
      });

      return { done, history };
    }

    function getProgressLabel(percent) {
      if (percent >= 100) return 'COMPLETE';
      if (percent >= 70) return 'GOOD';
      if (percent >= 30) return 'KEEP';
      return 'START';
    }

    function getCardAccentStyle(idx, archived = false) {
      const accents = [
        'linear-gradient(140deg, rgba(255,255,255,.93), rgba(139,187,255,.16))',
        'linear-gradient(140deg, rgba(255,255,255,.93), rgba(255,173,204,.15))',
        'linear-gradient(140deg, rgba(255,255,255,.93), rgba(169,232,194,.16))',
        'linear-gradient(140deg, rgba(255,255,255,.93), rgba(255,214,153,.17))'
      ];
      const bg = archived
        ? 'linear-gradient(140deg, rgba(255,255,255,.9), rgba(183,183,183,.14))'
        : accents[idx % accents.length];
      const border = archived
        ? 'rgba(110,110,110,.25)'
        : 'rgba(var(--accent-rgb), .32)';
      return `background:${bg}; border-left:4px solid ${border};`;
    }

    function renderList() {
      const list = document.getElementById('chartList');
      const archiveSection = document.getElementById('archiveSection');
      const archiveList = document.getElementById('archiveList');
      const empty = document.getElementById('emptyState');
      list.innerHTML = '';
      archiveList.innerHTML = '';
      archiveSection.style.display = 'none';

      if (charts.length === 0) {
        empty.style.display = 'block';
        return;
      }

      const activeCharts = charts.filter((chart) => !chart.archived);
      const archivedCharts = charts.filter((chart) => chart.archived);

      if (activeCharts.length === 0) {
        empty.style.display = 'block';
        empty.innerHTML = '表示中のチャートがありません。<br>アーカイブを復元するか「＋ 新規」か作成してください。';
      } else {
        empty.style.display = 'none';
        empty.innerHTML = 'チャートがありません。<br>「＋ 新規」から作成してください。';
      }

      let hadSanitized = false;
      activeCharts.forEach((chart, idx) => {
        if (sanitizeChartRecords(chart)) hadSanitized = true;
        const { done } = computeProgress(chart);
        const p = chart.total ? Math.round((done / chart.total) * 100) : 0;
        const start = getChartStart(chart);
        const end = getChartEnd(chart);

        const item = document.createElement('div');
        item.className = 'glass card chart-item card-accent';
        item.style.animationDelay = `${idx * 0.03}s`;
        item.style.cssText += getCardAccentStyle(idx);
        item.onclick = () => showChart(chart.id);
        const status = getProgressLabel(p);
        item.innerHTML = `
          <div class="title-row">
            <div class="title">${chart.name}</div>
            <div class="chart-chip">${status}</div>
          </div>
          <div class="meta"><span class="due-date">${start.getMonth() + 1}/${start.getDate()} - ${end.getMonth() + 1}/${end.getDate()}</span> ・ ${done}/${chart.total}${chart.unit}</div>
          <div class="progress-track"><div class="progress-bar" style="width:${p}%"></div></div>
          <canvas class="mini-canvas"></canvas>
        `;
        list.appendChild(item);
        drawMiniGraph(item.querySelector('.mini-canvas'), chart);
      });

      archivedCharts.forEach((chart, idx) => {
        const { done } = computeProgress(chart);
        const start = getChartStart(chart);
        const end = getChartEnd(chart);
        const item = document.createElement('div');
        item.className = 'glass card archive-item card-accent';
        item.style.animationDelay = `${idx * 0.03}s`;
        item.style.cssText += getCardAccentStyle(idx, true);
        item.innerHTML = `
          <div class="title-row">
            <div class="title">${chart.name}</div>
            <div class="chart-chip">ARCHIVE</div>
          </div>
          <div class="meta"><span class="due-date">${start.getMonth() + 1}/${start.getDate()} - ${end.getMonth() + 1}/${end.getDate()}</span> ・ ${done}/${chart.total}${chart.unit}</div>
          <div class="archive-actions">
            <button class="archive-restore-btn" onclick="restoreChart(${chart.id})">復元</button>
          </div>
        `;
        archiveList.appendChild(item);
      });

      if (archivedCharts.length > 0) {
        archiveSection.style.display = 'block';
        archiveList.style.display = archiveSectionClosed ? 'none' : 'grid';
        const btn = document.getElementById('archiveCloseBtn');
        if (btn) btn.textContent = archiveSectionClosed ? '開く' : '閉じる';
      }

      if (hadSanitized) {
        saveLocalData();
      }
    }

    function drawMiniGraph(canvas, chart) {
      if (!canvas) return;
      const { history } = computeProgress(chart);
      const ctx = canvas.getContext('2d');
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      const ratio = window.devicePixelRatio || 1;
      canvas.width = w * ratio;
      canvas.height = h * ratio;
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      ctx.clearRect(0, 0, w, h);

      const p = 10;
      const gw = w - p * 2;
      const gh = h - p * 2;
      const accentRgb = getComputedStyle(document.documentElement).getPropertyValue('--accent-rgb').trim() || '47, 157, 255';
      
      ctx.strokeStyle = `rgba(${accentRgb}, .15)`;
      ctx.lineWidth = 1;
      ctx.strokeRect(p, p, gw, gh);

      const startDate = getChartStart(chart);
      const endDate = getChartEnd(chart);
      const spanDays = Math.max(1, Math.ceil((endDate - startDate) / 86400000));

      const points = [];
      points.push({ x: p, y: p + gh });

      let lastX = p;
      let lastY = p + gh;

      history.forEach((point) => {
        const pointDate = parseLocalDate(point.date);
        let dayIndex = Math.floor((pointDate - startDate) / 86400000);
        if (dayIndex < 0) dayIndex = 0;
        if (dayIndex > spanDays) dayIndex = spanDays;

        const done = Math.max(0, chart.total - point.remaining);
        const px = p + (dayIndex / spanDays) * gw;
        const py = p + gh - (done / Math.max(1, chart.total)) * gh;

        points.push({ x: px, y: lastY });
        points.push({ x: px, y: py });
        lastX = px;
        lastY = py;
      });

      const todayDate = normalizeDay(new Date());
      let todayIndex = Math.floor((todayDate - startDate) / 86400000);
      if (todayIndex >= 0 && history.length > 0) {
        if (todayIndex > spanDays) todayIndex = spanDays;
        const todayX = p + (todayIndex / spanDays) * gw;
        if (todayX > lastX) {
           points.push({ x: todayX, y: lastY });
           lastX = todayX;
        }
      }

      if (points.length <= 1) {
         return;
      }

      const gradient = ctx.createLinearGradient(0, p, 0, h - p);
      gradient.addColorStop(0, `rgba(${accentRgb}, .35)`);
      gradient.addColorStop(1, `rgba(${accentRgb}, .04)`);

      ctx.beginPath();
      ctx.moveTo(points[0].x, points[0].y);
      for (let i = 1; i < points.length; i++) {
        ctx.lineTo(points[i].x, points[i].y);
      }
      
      ctx.strokeStyle = `rgba(${accentRgb}, .95)`;
      ctx.lineWidth = 2;
      ctx.lineJoin = 'round';
      ctx.stroke();

      ctx.lineTo(lastX, p + gh);
      ctx.lineTo(p, p + gh);
      ctx.closePath();
      ctx.fillStyle = gradient;
      ctx.fill();
    }

    function showChart(id, options = {}) {
      currentChart = charts.find((c) => c.id === id);
      if (!currentChart) return;
      if (currentChart.archived) return;

      document.getElementById('homeScreen').style.display = 'none';
      document.getElementById('chartScreen').style.display = 'block';
      document.getElementById('chartTitle').textContent = currentChart.name;
      const today = normalizeDay(new Date());
      const chartStart = getChartStart(currentChart);
      const chartEnd = getChartEnd(currentChart);
      const restoredSelected = options.selectedDate ? normalizeDay(options.selectedDate) : null;
      const inRangeSelected = restoredSelected && restoredSelected >= chartStart && restoredSelected <= chartEnd;
      selectedDate = inRangeSelected
        ? restoredSelected
        : (today < chartStart ? chartStart : (today > chartEnd ? chartEnd : today));
      const restoredCalendar = options.calendarBase ? normalizeDay(options.calendarBase) : null;
      calendarBase = restoredCalendar
        ? new Date(restoredCalendar.getFullYear(), restoredCalendar.getMonth(), 1)
        : new Date(selectedDate.getFullYear(), selectedDate.getMonth(), 1);
      saveViewState();
      updateChartUI();
    }

    function closeChart() {
      currentChart = null;
      document.getElementById('chartScreen').style.display = 'none';
      document.getElementById('homeScreen').style.display = 'block';
      clearViewState();
      renderList();
    }

    function updateChartUI() {
      if (!currentChart) return;
      if (sanitizeChartRecords(currentChart)) {
        saveLocalData();
      }

      const { done, history } = computeProgress(currentChart);
      const remain = Math.max(0, currentChart.total - done);
      const deadline = getChartEnd(currentChart);
      const today = normalizeDay(new Date());
      const daysLeft = Math.max(0, dayDiff(deadline, today) + 1);
      const daily = daysLeft > 0 ? Math.ceil(remain / daysLeft) : remain;
      const progress = currentChart.total ? Math.round((done / currentChart.total) * 100) : 0;

      document.getElementById('graphInfo').textContent = `${currentChart.total}${currentChart.unit} / 残り ${remain}${currentChart.unit}`;
      document.getElementById('dailyNeed').textContent = daily;
      document.getElementById('dailyUnit').textContent = currentChart.unit;
      document.getElementById('remainText').textContent = `あと${daysLeft}日 ・ 残り${remain}${currentChart.unit}`;
      document.getElementById('progressValue').textContent = `${progress}%`;
      document.getElementById('progressSub').textContent = `${done}/${currentChart.total}${currentChart.unit}`;
      document.getElementById('recordUnit').textContent = currentChart.unit;

      drawGraph(currentChart, history);
      renderCalendar();
      loadRecord();
    }

    function drawGraph(chart, history) {
      const canvas = document.getElementById('chartCanvas');
      const ctx = canvas.getContext('2d');
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      const ratio = window.devicePixelRatio || 1;

      canvas.width = w * ratio;
      canvas.height = h * ratio;
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);

      ctx.clearRect(0, 0, w, h);

      const p = 28;
      const gw = w - p * 2;
      const gh = h - p * 2;
      const startDate = getChartStart(chart);
      const endDate = getChartEnd(chart);
      const spanDays = Math.max(1, Math.ceil((endDate - startDate) / 86400000));

      // theme-adaptive colors
      const cs = getComputedStyle(document.documentElement);
      const accentRgbVal = cs.getPropertyValue('--accent-rgb').trim() || '0,112,188';
      const textSoftVal = cs.getPropertyValue('--text-soft').trim() || 'rgba(92,120,170,0.9)';
      const lineVal = cs.getPropertyValue('--line').trim() || 'rgba(100,132,192,0.3)';

      // axis
      ctx.strokeStyle = lineVal;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(p, p);
      ctx.lineTo(p, h - p);
      ctx.lineTo(w - p, h - p);
      ctx.stroke();

      // ideal line
      ctx.setLineDash([6, 6]);
      ctx.strokeStyle = `rgba(${accentRgbVal}, 0.38)`;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(p, p);
      ctx.lineTo(w - p, h - p);
      ctx.stroke();
      ctx.setLineDash([]);

      // actual line (day boundary rendering to avoid 90° kink)
      {
        const accentRgb = accentRgbVal;
        const historyMap = new Map(history.map((point) => [point.date, point.remaining]));
        const today = normalizeDay(new Date());
        const maxElapsed = Math.max(0, Math.min(spanDays, dayDiff(today, startDate) + 1));
        let remaining = chart.total;
        ctx.strokeStyle = `rgba(${accentRgb}, 0.95)`;
        ctx.lineWidth = 2.4;
        ctx.beginPath();
        ctx.moveTo(p, p);
        for (let elapsed = 1; elapsed <= maxElapsed; elapsed++) {
          const day = new Date(startDate);
          day.setDate(day.getDate() + elapsed - 1);
          const key = toDateInputValue(day);
          if (historyMap.has(key)) remaining = historyMap.get(key);
          const x = p + (gw * (elapsed / spanDays));
          const y = h - p - (gh * (remaining / Math.max(chart.total, 1)));
          ctx.lineTo(x, y);
        }

        ctx.stroke();
      }

      // y labels
      ctx.fillStyle = textSoftVal;
      ctx.font = '11px sans-serif';
      ctx.textAlign = 'right';
      for (let i = 0; i <= 5; i++) {
        const y = p + (gh * i / 5);
        const val = Math.round(chart.total - chart.total * i / 5);
        ctx.fillText(val.toLocaleString(), p - 6, y + 3);
      }

      // x labels
      ctx.textAlign = 'center';
      for (let i = 0; i <= 5; i++) {
        const d = new Date(startDate);
        d.setDate(d.getDate() + Math.round((spanDays / 5) * i));
        const x = p + (gw * i / 5);
        ctx.fillText(`${d.getMonth() + 1}/${d.getDate()}`, x, h - 7);
      }
    }

    function renderCalendar() {
      document.getElementById('monthLabel').textContent = `${calendarBase.getFullYear()}年${calendarBase.getMonth() + 1}月`;

      const weekRow = document.getElementById('weekRow');
      if (!weekRow.innerHTML) {
        weekRow.innerHTML = weekLabels.map((w) => `<div>${w}</div>`).join('');
      }

      const grid = document.getElementById('dayGrid');
      grid.innerHTML = '';
      const first = new Date(calendarBase.getFullYear(), calendarBase.getMonth(), 1);
      const start = new Date(first);
      start.setDate(first.getDate() - first.getDay());

      for (let i = 0; i < 42; i++) {
        const d = new Date(start);
        d.setDate(start.getDate() + i);
        const today = normalizeDay(new Date());
        const isFuture = normalizeDay(d) > today;
        const chartStart = getChartStart(currentChart);
        const chartEnd = getChartEnd(currentChart);
        const isOutOfRange = normalizeDay(d) < chartStart || normalizeDay(d) > chartEnd;

        const btn = document.createElement('button');
        btn.className = 'day-btn';
        if (d.getMonth() !== calendarBase.getMonth()) btn.classList.add('other');
        if (isFuture || isOutOfRange) btn.classList.add('future');
        if (formatKey(d) === formatKey(selectedDate)) btn.classList.add('active');
        btn.textContent = d.getDate();
        btn.disabled = isFuture || isOutOfRange;

        btn.onclick = () => {
          selectedDate = d;
          if (d.getMonth() !== calendarBase.getMonth()) {
            calendarBase = new Date(d.getFullYear(), d.getMonth(), 1);
          }
          saveViewState();
          renderCalendar();
          loadRecord();
        };

        grid.appendChild(btn);
      }
    }

    function changeMonth(offset) {
      calendarBase.setMonth(calendarBase.getMonth() + offset);
      saveViewState();
      renderCalendar();
    }

    function loadRecord() {
      if (!currentChart) return;
      const key = formatKey(selectedDate);
      const rec = currentChart.records[key] || { amount: 0, memo: '' };
      const startKey = toDateInputValue(getChartStart(currentChart));
      const endKey = toDateInputValue(getChartEnd(currentChart));
      const isFuture = key > todayKey();
      const isOutOfRange = key < startKey || key > endKey;
      skipRecordAutosave = true;
      document.getElementById('recordLabel').textContent = `${formatJa(selectedDate)}の成果`;
      document.getElementById('recordInput').value = rec.amount || 0;
      document.getElementById('memoInput').value = rec.memo || '';
      skipRecordAutosave = false;
      document.getElementById('recordInput').disabled = isFuture || isOutOfRange;
      document.getElementById('memoInput').disabled = isFuture || isOutOfRange;
      document.querySelector('#calendarCard .save').disabled = isFuture || isOutOfRange;
      if (isFuture) {
        document.getElementById('recordLabel').textContent = `${formatJa(selectedDate)}は未来日のため記録できません`;
      } else if (isOutOfRange) {
        document.getElementById('recordLabel').textContent = `${formatJa(selectedDate)}は期間外のため記録できません`;
      }
    }

    function saveRecord(options = {}) {
      if (!currentChart) return;
      const key = formatKey(selectedDate);
      const startKey = toDateInputValue(getChartStart(currentChart));
      const endKey = toDateInputValue(getChartEnd(currentChart));
      if (key < startKey || key > endKey) {
        if (!options.silent) alert('設定した期間外の日には記録できません');
        return;
      }
      if (dayDiff(selectedDate, new Date()) > 0 || key > todayKey()) {
        if (!options.silent) alert('未来の日付には記録できません');
        return;
      }
      const amount = Math.max(0, Number(document.getElementById('recordInput').value) || 0);
      const memo = document.getElementById('memoInput').value;
      if (amount === 0 && !memo) {
        delete currentChart.records[key];
      } else {
        currentChart.records[key] = { amount, memo };
      }
      saveLocalData();
      if (options.refresh !== false) updateChartUI();
    }

    function handleRecordAutoSave() {
      if (skipRecordAutosave) return;
      saveRecord({ silent: true, refresh: false });
    }

    function openEditModal() {
      if (!currentChart) return;
      document.getElementById('editName').value = currentChart.name;
      document.getElementById('editStart').value = toDateInputValue(getChartStart(currentChart));
      document.getElementById('editEnd').value = toDateInputValue(getChartEnd(currentChart));
      document.getElementById('editTotal').value = currentChart.total;
      document.getElementById('archiveToggleBtn').textContent = currentChart.archived ? 'アーカイブ解除' : 'アーカイブ';
      document.getElementById('editModal').style.display = 'flex';
    }

    function closeEditModal() {
      document.getElementById('editModal').style.display = 'none';
    }

    function saveEdit() {
      if (!currentChart) return;
      const name = document.getElementById('editName').value.trim();
      const startDate = document.getElementById('editStart').value;
      const endDate = document.getElementById('editEnd').value;
      const total = Number(document.getElementById('editTotal').value);

      if (!name || !startDate || !endDate || !total) {
        alert('入力を確認してください');
        return;
      }
      if (normalizeDay(startDate) > normalizeDay(endDate)) {
        alert('入力を確認してください');
        return;
      }

      currentChart.name = name;
      currentChart.startDate = startDate;
      currentChart.endDate = endDate;
      currentChart.total = total;
      saveLocalData();
      closeEditModal();
      updateChartUI();
    }

    function deleteChart() {
      if (!currentChart) return;
      if (!confirm('削除しますか？')) return;
      charts = charts.filter((c) => c.id !== currentChart.id);
      saveLocalData();
      closeEditModal();
      closeChart();
    }

    function toggleArchiveCurrentChart() {
      if (!currentChart) return;
      const nextArchived = !currentChart.archived;
      const message = nextArchived ? 'このチャートをアーカイブしますか？' : 'このチャートをアーカイブ解除しますか？';
      if (!confirm(message)) return;
      currentChart.archived = nextArchived;
      saveLocalData();
      closeEditModal();
      if (currentChart.archived) {
        closeChart();
      } else {
        updateChartUI();
      }
    }

    function restoreChart(chartId) {
      const chart = charts.find((c) => c.id === chartId);
      if (!chart) return;
      chart.archived = false;
      saveLocalData();
      renderList();
    }

    function switchChartWithAnimation(targetId, direction) {
      if (isSwitchingChart) return;
      const screen = document.getElementById('chartScreen');
      const outClass = direction > 0 ? 'chart-switch-out-left' : 'chart-switch-out-right';
      const inClass = direction > 0 ? 'chart-switch-in-left' : 'chart-switch-in-right';
      isSwitchingChart = true;
      screen.classList.add(outClass);
      setTimeout(() => {
        screen.classList.remove(outClass);
        showChart(targetId);
        screen.classList.add(inClass);
        setTimeout(() => {
          screen.classList.remove(inClass);
          isSwitchingChart = false;
        }, 240);
      }, 200);
    }

    function showSiblingChart(direction) {
      const activeCharts = charts.filter((chart) => !chart.archived);
      if (!currentChart || activeCharts.length < 2 || isSwitchingChart) return;
      const idx = activeCharts.findIndex((c) => c.id === currentChart.id);
      if (idx < 0) return;
      const next = idx + direction;
      if (next < 0 || next >= activeCharts.length) return;
      switchChartWithAnimation(activeCharts[next].id, direction);
    }

    const chartScreen = document.getElementById('chartScreen');

    chartScreen.addEventListener('touchstart', (e) => {
      if (e.target.closest('button, input, textarea, select, #calendarCard')) return;
      const touch = e.changedTouches[0];
      swipeStartX = touch.clientX;
      swipeStartY = touch.clientY;
    }, { passive: true });

    chartScreen.addEventListener('touchend', (e) => {
      if (swipeStartX === null) return;
      const touch = e.changedTouches[0];
      const dx = touch.clientX - swipeStartX;
      const dy = touch.clientY - swipeStartY;
      swipeStartX = null;
      swipeStartY = null;
      if (Math.abs(dx) < 40 || Math.abs(dx) < Math.abs(dy) * 1.1) return;
      showSiblingChart(dx < 0 ? 1 : -1);
    }, { passive: true });

    window.addEventListener('resize', () => {
      if (!currentChart) return;
      const { history } = computeProgress(currentChart);
      drawGraph(currentChart, history);
    });


    window.addEventListener('online', () => {
      if (localMeta.pendingSync) saveCloudData();
    });
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden && localMeta.pendingSync) saveCloudData();
    });

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      installPromptEvent = e;
      document.getElementById('installBtn').style.display = 'inline-block';
    });

    window.addEventListener('appinstalled', () => {
      installPromptEvent = null;
      document.getElementById('installBtn').style.display = 'none';
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch((err) => {
          console.warn('service worker register failed', err);
        });
      });
    }

    document.getElementById('createModal').addEventListener('click', (e) => {
      if (e.target.id === 'createModal') closeCreateModal();
    });
    document.getElementById('editModal').addEventListener('click', (e) => {
      if (e.target.id === 'editModal') closeEditModal();
    });
    const settingsModal = document.getElementById('settingsModal');
    settingsModal.addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeSettingsModal();
    });
    settingsModal.addEventListener('pointerdown', (e) => {
      if (e.target === e.currentTarget) closeSettingsModal();
    });
    settingsModal.addEventListener('touchstart', (e) => {
      if (e.target === e.currentTarget) closeSettingsModal();
    });
    document.getElementById('recordInput').addEventListener('input', handleRecordAutoSave);
    document.getElementById('memoInput').addEventListener('input', handleRecordAutoSave);

    renderThemeButtons();
    renderList();
    restoreViewStateIfNeeded();
    initFirebaseAuth();
  </script>
</body>

</html>
