<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Anulis - 学習ペースメーカー</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-color: #0070bc;
            --accent-color: #00c6ff;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --card-bg: rgba(255, 255, 255, 0.85);
            --text-main: #333;
            --text-sub: #777;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            padding-bottom: 100px;
        }

        /* ヘッダー */
        .top-nav {
            padding: 50px 20px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-text { font-size: 24px; font-weight: 800; color: var(--primary-color); }

        .add-btn-round {
            background: var(--accent-color);
            color: white; border: none;
            width: 44px; height: 44px; border-radius: 14px;
            font-size: 24px; cursor: pointer;
            box-shadow: 0 4px 12px rgba(0,198,255,0.3);
        }

        /* チャートリスト (2カラムグリッド) */
        .container { padding: 15px; }
        .chart-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .chart-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.6);
            backdrop-filter: blur(10px);
            cursor: pointer;
        }

        .card-title { font-size: 15px; font-weight: 700; margin-bottom: 5px; }
        .card-info { font-size: 11px; color: var(--text-sub); margin-bottom: 10px; }

        .progress-container {
            height: 6px; background: rgba(0,0,0,0.05);
            border-radius: 3px; overflow: hidden; margin-bottom: 4px;
        }
        .progress-fill {
            height: 100%; background: linear-gradient(90deg, var(--primary-color), var(--accent-color));
            transition: width 0.8s ease;
        }
        .progress-label { font-size: 10px; text-align: right; font-weight: 600; }

        /* モーダル (中央配置) */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(6px);
            z-index: 2000; justify-content: center; align-items: center;
            padding: 20px;
        }
        .modal-window {
            background: white; width: 100%; max-width: 380px;
            border-radius: 28px; padding: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        }

        .form-group { margin-bottom: 15px; }
        .form-label { font-size: 13px; color: var(--text-sub); margin-bottom: 6px; display: block; }
        .form-input {
            width: 100%; padding: 12px; border-radius: 12px;
            border: 1px solid #eee; background: #f9f9f9; font-size: 16px;
        }

        .submit-btn {
            width: 100%; padding: 14px; background: var(--primary-color);
            color: white; border: none; border-radius: 12px;
            font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 10px;
        }

        /* 詳細画面 (フルスクリーン) */
        .detail-view {
            display: none; position: fixed; inset: 0;
            background: var(--bg-gradient); z-index: 1000;
            overflow-y: auto; padding: 50px 20px;
        }
        .detail-card {
            background: white; border-radius: 24px; padding: 20px;
            margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        /* タブバー */
        .bottom-tab {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 70px; background: rgba(255,255,255,0.9);
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid rgba(0,0,0,0.05); padding-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <div class="logo-text">Anulis</div>
        <button class="add-btn-round" onclick="openModal()">＋</button>
    </div>

    <div class="container">
        <h2 style="margin-bottom: 15px; font-size: 22px;">マイチャート</h2>
        <div class="chart-grid" id="chartGrid">
            </div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal-window">
            <h3 style="margin-bottom: 20px; text-align: center;">新規チャート作成</h3>
            <div class="form-group">
                <label class="form-label">チャート名</label>
                <input type="text" id="m_name" class="form-input" placeholder="例: 数学I 青チャート">
            </div>
            <div class="form-group">
                <label class="form-label">終わらせたい期日</label>
                <input type="date" id="m_date" class="form-input">
            </div>
            <div style="display: flex; gap: 10px;">
                <div style="flex: 2;">
                    <label class="form-label">目標量</label>
                    <input type="number" id="m_total" class="form-input" placeholder="300">
                </div>
                <div style="flex: 1;">
                    <label class="form-label">単位</label>
                    <select id="m_unit" class="form-input">
                        <option>ページ</option>
                        <option>問</option>
                        <option>ユニット</option>
                    </select>
                </div>
            </div>
            <button class="submit-btn" onclick="saveNewChart()">チャートを作成する</button>
            <button onclick="closeModal()" style="width:100%; border:none; background:none; margin-top:15px; color:#aaa;">キャンセル</button>
        </div>
    </div>

    <div class="detail-view" id="detailView">
        <button onclick="closeDetail()" style="background:none; border:none; font-size: 24px; margin-bottom: 20px;">← 戻る</button>
        
        <div class="detail-card">
            <h2 id="d_title" style="margin-bottom: 5px;">タイトル</h2>
            <p id="d_info" style="color:#888; font-size: 14px; margin-bottom: 20px;">期日: ---</p>
            
            <div style="height: 250px;">
                <canvas id="progressChart"></canvas>
            </div>
        </div>

        <div class="detail-card">
            <h3 style="margin-bottom: 15px; font-size: 16px;">進捗を記録する</h3>
            <div style="display: flex; gap: 10px; align-items: center;">
                <input type="number" id="record_val" class="form-input" placeholder="今日の進んだ量">
                <span id="d_unit_label">問</span>
                <button class="submit-btn" style="margin:0; width: 100px;" onclick="addProgress()">追加</button>
            </div>
            <p id="pace_advice" style="margin-top: 15px; font-size: 13px; color: var(--primary-color); font-weight: 600; text-align: center;"></p>
        </div>
        
        <button onclick="deleteChart()" style="width:100%; padding:15px; background:none; border:none; color:#ff7675;">チャートを削除する</button>
    </div>

    <div class="bottom-tab">
        <div style="color: var(--accent-color); font-size: 24px;">⌂</div>
        <div style="color: #ccc; font-size: 24px;">○</div>
        <div style="color: #ccc; font-size: 24px;">⚇</div>
    </div>

    <script>
        let charts = JSON.parse(localStorage.getItem('anulis_v3_data')) || [];
        let currentId = null;
        let myChart = null;

        function openModal() { document.getElementById('modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        function saveNewChart() {
            const name = document.getElementById('m_name').value;
            const date = document.getElementById('m_date').value;
            const total = parseInt(document.getElementById('m_total').value);
            const unit = document.getElementById('m_unit').value;

            if(!name || !date || !total) return alert('全ての項目を正しく入力してください');

            const newChart = {
                id: Date.now(),
                name,
                deadline: date,
                total,
                unit,
                completed: 0,
                history: [{ date: new Date().toISOString().split('T')[0], val: 0 }]
            };

            charts.push(newChart);
            updateStorage();
            renderList();
            closeModal();
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
        }

        function renderList() {
            const grid = document.getElementById('chartGrid');
            grid.innerHTML = '';
            charts.forEach(c => {
                const percent = Math.min(100, Math.round((c.completed / c.total) * 100));
                const d = new Date(c.deadline);
                const dateStr = `${d.getMonth()+1}/${d.getDate()}`;

                const card = document.createElement('div');
                card.className = 'chart-card';
                card.onclick = () => openDetail(c.id);
                card.innerHTML = `
                    <div class="card-title">${c.name}</div>
                    <div class="card-info">期日: ${dateStr} | ${c.total}${c.unit}</div>
                    <div class="progress-container"><div class="progress-fill" style="width:${percent}%"></div></div>
                    <div class="progress-label">${percent}%</div>
                `;
                grid.appendChild(card);
            });
        }

        function openDetail(id) {
            currentId = id;
            const c = charts.find(x => x.id === id);
            document.getElementById('d_title').textContent = c.name;
            document.getElementById('d_info').textContent = `期日: ${c.deadline} (${c.total}${c.unit}目標)`;
            document.getElementById('d_unit_label').textContent = c.unit;
            document.getElementById('detailView').style.display = 'block';
            
            updateAdvice(c);
            initChart(c);
        }

        function closeDetail() { document.getElementById('detailView').style.display = 'none'; }

        function addProgress() {
            const val = parseInt(document.getElementById('record_val').value);
            if(isNaN(val)) return;

            const c = charts.find(x => x.id === currentId);
            c.completed += val;
            c.history.push({ date: new Date().toISOString().split('T')[0], val: c.completed });

            updateStorage();
            initChart(c);
            updateAdvice(c);
            renderList();
            document.getElementById('record_val').value = '';
        }

        function updateAdvice(c) {
            const today = new Date();
            const end = new Date(c.deadline);
            const diff = Math.ceil((end - today) / (1000 * 60 * 60 * 24));
            const remain = Math.max(0, c.total - c.completed);
            const pace = diff > 0 ? Math.ceil(remain / diff) : remain;
            
            document.getElementById('pace_advice').textContent = 
                remain > 0 ? `期日まであと${diff}日。1日あたり「${pace}${c.unit}」ペースで完了！` : "目標達成！お疲れ様です！";
        }

        function initChart(c) {
            const ctx = document.getElementById('progressChart').getContext('2d');
            if(myChart) myChart.destroy();

            // 理想線のデータ (開始から目標値まで)
            const labels = c.history.map(h => h.date.split('-').slice(1).join('/'));
            if(labels.length < 2) labels.push("期日");

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '実績',
                        data: c.history.map(h => h.val),
                        borderColor: '#0070bc',
                        backgroundColor: 'rgba(0,112,188,0.1)',
                        fill: true, tension: 0.3
                    }, {
                        label: '理想',
                        data: [0, c.total], // 簡易的な理想線
                        borderColor: '#ccc',
                        borderDash: [5, 5],
                        fill: false
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { y: { beginAtZero: true, max: c.total } }
                }
            });
        }

        function deleteChart() {
            if(!confirm('このチャートを削除しますか？')) return;
            charts = charts.filter(x => x.id !== currentId);
            updateStorage();
            renderList();
            closeDetail();
        }

        function updateStorage() { localStorage.setItem('anulis_v3_data', JSON.stringify(charts)); }

        // 初期ロード
        renderList();
    </script>
</body>
</html>
