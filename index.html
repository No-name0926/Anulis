<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2f9dff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
  <title>Anulis</title>
  <!-- Updated source bundle for full inline handoff -->
  <style>
    :root {
      --bg: #eef4ff;
      --bg-deep: #dfeaff;
      --surface: rgba(255, 255, 255, 0.84);
      --surface-strong: rgba(255, 255, 255, 0.95);
      --line: #c9daf9;
      --text: #284578;
      --text-soft: #6f89b4;
      --accent: #2b6dff;
      --accent-deep: #1849c6;
      --accent-soft: #9ebfff;
      --accent-rgb: 43, 109, 255;
      --theme-pattern: radial-gradient(circle at 18px 18px, rgba(var(--accent-rgb), 0.2) 0 3px, transparent 3px);
      --shadow: 0 14px 30px rgba(var(--accent-rgb), 0.22);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Inter", "Noto Sans JP", "Hiragino Sans", -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      background:
        var(--theme-pattern),
        radial-gradient(1200px 600px at 10% -10%, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0) 50%),
        radial-gradient(700px 500px at 95% 30%, rgba(168,194,255,0.45) 0%, rgba(168,194,255,0) 60%),
        linear-gradient(180deg, #f6faff 0%, var(--bg) 45%, var(--bg-deep) 100%);
      background-size: 34px 34px, auto, auto, auto;
    }

    .orb {
      position: fixed;
      border-radius: 999px;
      filter: blur(22px);
      pointer-events: none;
      z-index: -1;
      opacity: .65;
      animation: float 10s ease-in-out infinite;
    }

    .orb.a {
      width: 180px;
      height: 180px;
      left: -50px;
      top: 70px;
      background: rgba(157, 188, 255, 0.6);
    }

    .orb.b {
      width: 220px;
      height: 220px;
      right: -80px;
      bottom: 80px;
      background: rgba(126, 163, 255, 0.45);
      animation-delay: -3s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(12px); }
    }

    .app {
      width: min(100%, 560px);
      margin: 0 auto;
      padding: 16px 14px 30px;
    }

    .auth-screen {
      width: min(100%, 560px);
      margin: 28px auto 0;
      padding: 0 14px;
      display: none;
    }

    .auth-gate {
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, rgba(246,250,255,.92), rgba(224,236,255,.9));
      backdrop-filter: blur(3px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 30;
    }

    .auth-gate.show { display: flex; }

    .auth-loader {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      border: 3px solid rgba(var(--accent-rgb), .22);
      border-top-color: rgba(var(--accent-rgb), .9);
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .auth-card {
      padding: 18px 16px;
      text-align: center;
    }

    .auth-title {
      font-size: 24px;
      font-weight: 760;
      color: var(--accent-deep);
      margin-bottom: 6px;
    }

    .auth-sub {
      color: var(--text-soft);
      font-size: 12.5px;
      margin-bottom: 14px;
    }
    .auth-btn {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 11px;
      margin-top: 8px;
      color: #fff;
      font-weight: 650;
      font-size: 13px;
      cursor: pointer;
    }

    .auth-btn.google { background: linear-gradient(135deg, #5393ff 0%, #3574ea 100%); }
    .auth-btn.twitter { background: linear-gradient(135deg, #59b8ff 0%, #2a98ef 100%); }

    .topbar {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      margin-bottom: 14px;
      gap: 8px;
    }

    .brand {
      text-align: center;
      font-size: 19px;
      font-weight: 620;
      letter-spacing: .03em;
      color: var(--accent-deep);
    }

    .glass {
      background: linear-gradient(145deg, color-mix(in srgb, var(--surface) 95%, white), color-mix(in srgb, var(--surface) 75%, var(--accent-soft)));
      border: 1px solid color-mix(in srgb, var(--line) 86%, white);
      border-radius: 16px;
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
      position: relative;
      isolation: isolate;
    }

    .glass::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(135deg, rgba(255,255,255,.7), rgba(var(--accent-rgb), .22));
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      z-index: 1;
    }

    .icon-btn {
      border: 1px solid var(--line);
      background: var(--surface-strong);
      color: var(--accent-deep);
      border-radius: 12px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 520;
      cursor: pointer;
      transition: transform .18s ease, box-shadow .2s ease;
      box-shadow: 0 6px 16px rgba(var(--accent-rgb), 0.2);
    }

    .icon-btn:active { transform: scale(0.96); }

    .list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .card {
      padding: 13px;
      border-radius: 16px;
      animation: fadeInUp .28s ease both;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(120deg, rgba(255,255,255,.45), rgba(255,255,255,0) 42%);
      opacity: .7;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .chart-item { cursor: pointer; transition: transform .18s ease, box-shadow .18s ease; }
    .chart-item:active { transform: scale(.985); }

    .title { font-size: 14px; font-weight: 620; color: var(--accent-deep); margin-bottom: 5px; }
    .meta { font-size: 11.5px; color: var(--text-soft); line-height: 1.5; }
    .meta .due-date {
      font-family: "Playfair Display", "Cormorant Garamond", serif;
      letter-spacing: .05em;
      color: color-mix(in srgb, var(--accent-deep) 72%, #455f8d);
      font-weight: 600;
    }

    .progress-track {
      margin-top: 8px;
      width: 100%;
      height: 4px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--accent) 16%, white);
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-soft) 0%, var(--accent) 100%);
      transition: width .35s ease;
    }

    .empty { text-align: center; padding: 42px 14px; color: var(--text-soft); font-size: 12.5px; }

    .primary {
      margin-top: 12px;
      width: 100%;
      border: none;
      border-radius: 13px;
      background: linear-gradient(135deg, var(--accent-soft) 0%, var(--accent) 100%);
      color: #fff;
      padding: 11px 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 9px 20px rgba(var(--accent-rgb), 0.3);
      transition: transform .2s ease;
    }

    .primary:active { transform: translateY(1px); }

    .chart-screen { display: none; }

    .chart-head {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .chart-name {
      text-align: center;
      font-size: 15px;
      font-weight: 620;
      color: var(--accent-deep);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .graph-wrap { padding: 12px 10px 8px; margin-bottom: 10px; }
    .graph-label { font-size: 11px; color: var(--text-soft); margin-bottom: 6px; }
    canvas { width: 100% !important; height: 320px !important; display: block; }

    .daily-hero {
      padding: 14px;
      margin-bottom: 10px;
      text-align: center;
      background: linear-gradient(140deg, rgba(var(--accent-rgb), 0.13) 0%, rgba(255,255,255,0.85) 80%);
    }

    .daily-caption {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 5px;
      letter-spacing: .1em;
      font-family: "Lora", "Playfair Display", "Cormorant Garamond", "Yu Mincho", serif;
      font-style: italic;
      color: color-mix(in srgb, var(--accent-deep) 84%, #1f2c44);
      text-shadow: 0 1px 0 rgba(255,255,255,.75);
      position: relative;
      display: inline-block;
      padding: 0 10px;
    }

    .daily-caption::after {
      content: "";
      position: absolute;
      left: 6px;
      right: 6px;
      bottom: -2px;
      height: 5px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(var(--accent-rgb), .12), rgba(var(--accent-rgb), .35), rgba(var(--accent-rgb), .12));
    }

    .daily-caption::before {
      content: "✦";
      position: absolute;
      left: -10px;
      top: -2px;
      color: rgba(var(--accent-rgb), .52);
      font-size: 12px;
      text-shadow: none;
    }

    .daily-big {
      font-size: 35px;
      font-weight: 800;
      color: var(--accent-deep);
      line-height: 1.15;
    }

    .progress-card {
      margin-bottom: 10px;
      text-align: center;
      padding: 12px;
      background: linear-gradient(150deg, rgba(255,255,255,.92), rgba(var(--accent-rgb), .09));
    }

    .kpi-label { font-size: 11.5px; color: var(--text-soft); margin-bottom: 4px; }
    .kpi-value { font-size: 25px; font-weight: 700; color: var(--accent-deep); line-height: 1; }
    .kpi-sub { font-size: 11px; color: var(--text-soft); margin-top: 4px; }

    .calendar-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 9px;
      padding-bottom: 6px;
      border-bottom: 1px dashed color-mix(in srgb, var(--accent) 24%, white);
    }

    .month-label { font-size: 14px; font-weight: 620; color: var(--accent-deep); }

    .week-row,
    .day-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      text-align: center;
    }

    .week-row {
      font-size: 10.5px;
      color: var(--text-soft);
      margin-bottom: 5px;
    }

    .day-btn {
      border: none;
      background: transparent;
      color: var(--text);
      font-size: 11.5px;
      width: 30px;
      height: 30px;
      margin: 1px auto;
      border-radius: 9px;
      cursor: pointer;
      transition: all .15s ease;
    }

    .day-btn:hover { background: rgba(var(--accent-rgb), .12); }
    .day-btn.other { color: color-mix(in srgb, var(--text-soft) 55%, white); }
    .day-btn.active {
      background: linear-gradient(135deg, var(--accent-soft) 0%, var(--accent) 100%);
      color: #fff;
      box-shadow: 0 5px 12px rgba(var(--accent-rgb), 0.28);
    }
    .day-btn.future {
      opacity: .42;
      cursor: not-allowed;
    }

    .record-line {
      margin-top: 8px;
      border-top: 1px solid var(--line);
      padding-top: 9px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 11.5px;
      color: var(--text-soft);
    }

    .record-input {
      width: 92px;
      border: none;
      border-bottom: 1px solid color-mix(in srgb, var(--accent) 40%, white);
      background: transparent;
      color: var(--accent-deep);
      font-size: 22px;
      text-align: right;
      outline: none;
      padding: 1px 0;
    }

    .memo {
      width: 100%;
      margin-top: 8px;
      border: none;
      border-bottom: 1px solid color-mix(in srgb, var(--accent) 40%, white);
      background: transparent;
      color: var(--text);
      font-size: 12px;
      padding: 8px 0;
      outline: none;
    }

    .save {
      margin-top: 9px;
      width: 100%;
      border: 1px solid color-mix(in srgb, var(--accent) 35%, white);
      background: color-mix(in srgb, var(--accent) 6%, white);
      color: var(--accent-deep);
      border-radius: 12px;
      padding: 9px;
      font-size: 12.5px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s ease;
    }

    .save:active { transform: scale(.99); }
    .save:hover { background: color-mix(in srgb, var(--accent) 11%, white); }

    .swipe-hint {
      margin-top: 6px;
      text-align: center;
      font-size: 10.5px;
      color: var(--text-soft);
      animation: pulse 2s ease-in-out infinite;
      letter-spacing: .04em;
    }

    @keyframes pulse {
      0%, 100% { opacity: .55; }
      50% { opacity: 1; }
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(32, 53, 92, 0.28);
      backdrop-filter: blur(4px);
      display: none;
      flex-direction: column;
      justify-content: flex-end;
      align-items: stretch;
      z-index: 20;
    }

    .modal-box {
      width: min(100%, 560px);
      margin: 0 auto;
      background: color-mix(in srgb, var(--accent) 5%, white);
      border-top-left-radius: 18px;
      border-top-right-radius: 18px;
      border: 1px solid color-mix(in srgb, var(--accent) 25%, white);
      border-bottom: none;
      padding: 15px;
      animation: popup .2s ease;
    }

    @keyframes popup { from { transform: translateY(24px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .input {
      width: 100%;
      border: 1px solid color-mix(in srgb, var(--accent) 28%, white);
      border-radius: 11px;
      padding: 10px;
      font-size: 13px;
      color: var(--text);
      background: #fff;
    }

    .field { margin-bottom: 10px; }
    .label { font-size: 11px; color: var(--text-soft); margin-bottom: 4px; display: block; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .unit-custom { display: none; margin-top: 8px; }
    .unit-custom.show { display: block; }

    .theme-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-top: 8px;
    }

    .theme-btn {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px;
      background: #fff;
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
    }

    .theme-btn.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(var(--accent-rgb), 0.22);
    }
    .mini-canvas {
      width: 100% !important;
      height: 90px !important;
      display: block;
      margin-top: 8px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.55);
      border: 1px solid color-mix(in srgb, var(--accent) 25%, white);
    }

    .chart-switch-out-left { animation: switchOutLeft .2s ease forwards; }
    .chart-switch-out-right { animation: switchOutRight .2s ease forwards; }
    .chart-switch-in-left { animation: switchInLeft .24s ease forwards; }
    .chart-switch-in-right { animation: switchInRight .24s ease forwards; }

    @keyframes switchOutLeft { to { opacity: 0; transform: translateX(-20px); } }
    @keyframes switchOutRight { to { opacity: 0; transform: translateX(20px); } }
    @keyframes switchInLeft { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes switchInRight { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
  </style>
</head>
<body>
  <div class="orb a"></div>
  <div class="orb b"></div>

  <div id="authScreen" class="auth-screen">
    <div class="glass auth-card">
      <div class="auth-title">Anulis</div>
      <div class="auth-sub">Google / X(Twitter) でログインして記録を同期</div>
      <button class="auth-btn google" onclick="loginWithGoogle()">Google でログイン</button>
      <button class="auth-btn twitter" onclick="loginWithTwitter()">X(Twitter) でログイン</button>
      
    </div>
  </div>

  <div id="authGate" class="auth-gate show">
    <div class="auth-loader" aria-label="loading"></div>
  </div>

  <div class="app" style="display:none;">
    <div id="homeScreen">
      <div class="topbar">
        <button class="icon-btn" onclick="openSettingsModal()">☰</button>
        <div class="brand">Anulis</div>
        <div style="display:flex; gap:6px; justify-content:flex-end;">
          <button id="installBtn" class="icon-btn" style="display:none;" onclick="installApp()">⬇︎ インストール</button>
          <button class="icon-btn" onclick="openCreateModal()">＋ 新規</button>
        </div>
      </div>
      <div id="chartList" class="list"></div>
      <div id="emptyState" class="glass card empty" style="display:none;">チャートがありません。<br>「＋ 新規」から作成してください。</div>
    </div>

    <div id="chartScreen" class="chart-screen">
      <div class="chart-head">
        <button class="icon-btn" onclick="closeChart()">← 戻る</button>
        <div class="chart-name" id="chartTitle">-</div>
        <button class="icon-btn" onclick="openEditModal()">編集</button>
      </div>

      <div class="glass card graph-wrap">
        <div class="graph-label" id="graphInfo">-</div>
        <canvas id="chartCanvas"></canvas>
      </div>

      <div class="glass card daily-hero">
        <div class="daily-caption">期日までに終わらせるためには</div>
        <div class="daily-big">一日 <span id="dailyNeed">0</span><span id="dailyUnit">問</span></div>
        <div class="kpi-sub" id="remainText">残り 0</div>
      </div>

      <div class="glass card progress-card">
        <div class="kpi-label">勉強進捗</div>
        <div class="kpi-value" id="progressValue">0%</div>
        <div class="kpi-sub" id="progressSub">0 / 0</div>
      </div>

      <div class="glass card" id="calendarCard">
        <div class="calendar-head">
          <button class="icon-btn" onclick="changeMonth(-1)">‹</button>
          <div class="month-label" id="monthLabel">2026年3月</div>
          <button class="icon-btn" onclick="changeMonth(1)">›</button>
        </div>
        <div class="week-row" id="weekRow"></div>
        <div class="day-grid" id="dayGrid"></div>

        <div class="record-line">
          <div id="recordLabel">3月23日の成果</div>
          <div>
            <input id="recordInput" type="number" min="0" class="record-input" value="0" />
            <span id="recordUnit">問</span>
          </div>
        </div>

        <input id="memoInput" class="memo" placeholder="メモを書く" />
        <button class="save" onclick="saveRecord()">保存</button>
      </div>

      <div class="swipe-hint">←→ スワイプで別チャートへ</div>
    </div>
  </div>

  <div class="modal" id="createModal">
    <div class="modal-box">
      <div class="field">
        <label class="label">タイトル</label>
        <input id="nameInput" class="input" placeholder="例: ターゲット1900" />
      </div>
      <div class="row">
        <div class="field">
          <label class="label">期日</label>
          <input id="deadlineInput" type="date" class="input" />
        </div>
        <div class="field">
          <label class="label">総量</label>
          <input id="totalInput" type="number" class="input" placeholder="1900" />
        </div>
      </div>
      <div class="field">
        <label class="label">単位</label>
        <select id="unitInput" class="input" onchange="toggleCustomUnit()">
          <option>問</option>
          <option>ページ</option>
          <option>時間</option>
          <option value="custom">カスタム</option>
        </select>
        <input id="customUnit" class="input unit-custom" maxlength="10" placeholder="自由入力（例: セット）" />
      </div>
      <button class="primary" onclick="createChart()">作成</button>
      <button class="save" style="margin-top:8px" onclick="closeCreateModal()">閉じる</button>
    </div>
  </div>

  <div class="modal" id="editModal">
    <div class="modal-box">
      <div class="field">
        <label class="label">タイトル</label>
        <input id="editName" class="input" />
      </div>
      <div class="row">
        <div class="field">
          <label class="label">期日</label>
          <input id="editDeadline" type="date" class="input" />
        </div>
        <div class="field">
          <label class="label">総量</label>
          <input id="editTotal" type="number" class="input" />
        </div>
      </div>
      <button class="primary" onclick="saveEdit()">保存</button>
      <button class="save" style="margin-top:8px" onclick="deleteChart()">削除</button>
      <button class="save" style="margin-top:8px" onclick="closeEditModal()">閉じる</button>
    </div>
  </div>

  <div class="modal" id="settingsModal">
    <div class="modal-box">
      <div class="field">
        <label class="label">テーマカラー</label>
        <div class="theme-grid" id="themeGrid"></div>
      </div>
      <button class="save" onclick="logoutUser()">ログアウト</button>
      <button class="save" onclick="closeSettingsModal()">閉じる</button>
    </div>
  </div>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Lora:wght@500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-analytics-compat.js"></script>
  <script>

    function applyTheme(themeName) {
      const key = themes[themeName] ? themeName : 'blue';
      const theme = themes[key];
      const root = document.documentElement;
      root.style.setProperty('--bg', theme.bg);
      root.style.setProperty('--bg-deep', theme.bgDeep);
      root.style.setProperty('--line', theme.line);
      root.style.setProperty('--text', theme.text);
      root.style.setProperty('--text-soft', theme.textSoft);
      root.style.setProperty('--accent', theme.accent);
      root.style.setProperty('--accent-deep', theme.accentDeep);
      root.style.setProperty('--accent-soft', theme.accentSoft);
      root.style.setProperty('--accent-rgb', theme.accentRgb);
      root.style.setProperty('--theme-pattern', theme.pattern);
      root.style.setProperty('--shadow', `0 14px 30px rgba(${theme.accentRgb}, 0.22)`);
      localStorage.setItem('anulisTheme', key);
      if (!currentChart) renderList();
      if (currentChart) updateChartUI();
      saveCloudData();

      document.querySelectorAll('.theme-btn').forEach((btn) => {
        btn.classList.toggle('active', btn.dataset.theme === key);
      });
    }

    function renderThemeButtons() {
      const grid = document.getElementById('themeGrid');
      if (!grid) return;
      grid.innerHTML = Object.entries(themes).map(([key, val]) => (
        `<button class="theme-btn" data-theme="${key}" onclick="applyTheme('${key}')">${val.label}</button>`
      )).join('');
      applyTheme(localStorage.getItem('anulisTheme') || 'blue');
    }

    function openSettingsModal() {
      document.getElementById('settingsModal').style.display = 'flex';
    }

    function closeSettingsModal() {
      document.getElementById('settingsModal').style.display = 'none';
    }

    function isFirebaseConfigured() {
      return firebaseConfig.apiKey && firebaseConfig.projectId;
    }

    function showAuthSetupHelp(providerName) {
      alert(
        `${providerName}ログインに失敗しました。` +
        `しばらく待ってから、もう一度お試しください。`
      );
    }

    function saveLocalData() {
      localStorage.setItem('anulisCharts', JSON.stringify(charts));
      localStorage.setItem('anulisTheme', localStorage.getItem('anulisTheme') || 'blue');
    }

    async function saveCloudData() {
      if (!firebaseReady || !currentUser || !db) return;
      const username = currentUser.displayName || 'user';
      try {
        await db.ref(`users/${currentUser.uid}`).set({
          username,
          charts,
          theme: localStorage.getItem('anulisTheme') || 'blue',
          updatedAt: Date.now()
        });
      } catch (e) {
        console.warn('cloud save failed', e);
      }
    }

    async function loadCloudData() {
      if (!firebaseReady || !currentUser || !db) return;
      try {
        const snap = await db.ref(`users/${currentUser.uid}`).once('value');
        const data = snap.val();
        if (data && typeof data === 'object') {
          charts = Array.isArray(data.charts) ? data.charts : [];
          if (data.theme) localStorage.setItem('anulisTheme', data.theme);
          saveLocalData();
        } else {
          // クラウドが空なら、既存ローカルデータを初回同期
          await saveCloudData();
        }
      } catch (e) {
        console.warn('cloud load failed', e);
      }
    }

    function showAuthGate(show) {
      const gate = document.getElementById('authGate');
      if (!gate) return;
      gate.classList.toggle('show', show);
    }

    function setSignedInUI(signedIn) {
      document.getElementById('authScreen').style.display = signedIn ? 'none' : 'block';
      document.querySelector('.app').style.display = signedIn ? 'block' : 'none';
      if (signedIn) showAuthGate(false);
    }

    async function initFirebaseAuth() {
      if (!window.firebase || !isFirebaseConfigured()) {
        setSignedInUI(true);
        return;
      }
      const wasSignedIn = localStorage.getItem('anulisSignedIn') === '1';
      if (wasSignedIn) {
        setSignedInUI(true);
        showAuthGate(false);
      } else {
        showAuthGate(true);
      }
      firebase.initializeApp(firebaseConfig);
      if (firebase.analytics) firebase.analytics();
      auth = firebase.auth();
      db = firebase.database();
      firebaseReady = true;
      authGateTimer = setTimeout(() => showAuthGate(false), wasSignedIn ? 2200 : 1200);
      auth.onAuthStateChanged(async (user) => {
        clearTimeout(authResolveTimer);
        currentUser = user;
        if (user) {
          localStorage.setItem('anulisSignedIn', '1');
          clearTimeout(authGateTimer);
          setSignedInUI(true);
          await loadCloudData();
          renderThemeButtons();
          renderList();
        } else {
          localStorage.setItem('anulisSignedIn', '0');
          const delay = wasSignedIn ? 2600 : 450;
          clearTimeout(authGateTimer);
          authResolveTimer = setTimeout(() => {
            setSignedInUI(false);
            showAuthGate(false);
          }, delay);
        }
      });
    }

    async function loginWithGoogle() {
      if (!auth) return alert('Firebase設定を先に入れてください');
      const provider = new firebase.auth.GoogleAuthProvider();
      try {
        await auth.signInWithPopup(provider);
      } catch (e) {
        if (e.code === 'auth/unauthorized-domain') {
          showAuthSetupHelp('Google');
          return;
        }
        if (
          e.code === 'auth/popup-blocked' ||
          e.code === 'auth/popup-closed-by-user' ||
          e.code === 'auth/operation-not-supported-in-this-environment'
        ) {
          await auth.signInWithRedirect(provider);
          return;
        }
        alert(`Googleログイン失敗: ${e.message}`);
      }
    }

        await auth.signInWithPopup(provider);

        ) {

    function formatKey(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function formatJa(date) {
      return `${date.getMonth() + 1}月${date.getDate()}日`;
    }

    function normalizeDay(dateLike) {
      const d = new Date(dateLike);
      return new Date(d.getFullYear(), d.getMonth(), d.getDate());
    }

    function dayDiff(a, b) {
      return Math.floor((normalizeDay(a) - normalizeDay(b)) / 86400000);
    }

    function openCreateModal() {
      document.getElementById('createModal').style.display = 'flex';
      const d = new Date();
      d.setDate(d.getDate() + 7);
      document.getElementById('deadlineInput').value = d.toISOString().split('T')[0];
    }

    function closeCreateModal() {
      document.getElementById('createModal').style.display = 'none';
    }

    function toggleCustomUnit() {
      const unit = document.getElementById('unitInput').value;
      document.getElementById('customUnit').classList.toggle('show', unit === 'custom');
    }

    function createChart() {
      const name = document.getElementById('nameInput').value.trim();
      const deadline = document.getElementById('deadlineInput').value;
      const total = Number(document.getElementById('totalInput').value);
      const unitSel = document.getElementById('unitInput').value;
      const custom = document.getElementById('customUnit').value.trim();
      const unit = unitSel === 'custom' ? custom : unitSel;

      if (!name || !deadline || !total || !unit) {
        alert('入力を確認してください');
        return;
      }

      charts.push({
        id: Date.now(),
        name,
        deadline,
        total,
        unit,
        createdAt: new Date().toISOString(),
        records: {}
      });

      saveLocalData();
      saveCloudData();
      closeCreateModal();
      renderList();
    }

    function todayKey() {
      return formatKey(new Date());
    }

    function sanitizeFutureRecords(chart) {
      if (!chart || !chart.records) return false;
      const nowKey = todayKey();
      let changed = false;
      Object.keys(chart.records).forEach((key) => {
        if (key > nowKey) {
          delete chart.records[key];
          changed = true;
        }
      });
      return changed;
    }

    function computeProgress(chart) {
      const keys = Object.keys(chart.records || {}).sort();
      let done = 0;
      const history = [];
      const nowKey = todayKey();

      keys.forEach((key) => {
        if (key > nowKey) return;
        done += Number(chart.records[key]?.amount || 0);
        if (done > chart.total) done = chart.total;
        history.push({ date: key, remaining: Math.max(0, chart.total - done) });
      });

      return { done, history };
    }

    function renderList() {
      const list = document.getElementById('chartList');
      const empty = document.getElementById('emptyState');
      list.innerHTML = '';

      if (charts.length === 0) {
        empty.style.display = 'block';
        return;
      }

      empty.style.display = 'none';
      let hadSanitized = false;
      charts.forEach((chart, idx) => {
        if (sanitizeFutureRecords(chart)) hadSanitized = true;
        const { done } = computeProgress(chart);
        const p = chart.total ? Math.round((done / chart.total) * 100) : 0;
        const d = new Date(chart.deadline);

        const item = document.createElement('div');
        item.className = 'glass card chart-item';
        item.style.animationDelay = `${idx * 0.03}s`;
        item.onclick = () => showChart(chart.id);
        item.innerHTML = `
          <div class="title">${chart.name}</div>
          <div class="meta"><span class="due-date">期日 ${d.getMonth() + 1}/${d.getDate()}</span> ・ ${done}/${chart.total}${chart.unit}</div>
          <div class="progress-track"><div class="progress-bar" style="width:${p}%"></div></div>
          <canvas class="mini-canvas"></canvas>
        `;
        list.appendChild(item);
        drawMiniGraph(item.querySelector('.mini-canvas'), chart);
      });

      if (hadSanitized) {
        saveLocalData();
        saveCloudData();
      }
    }

    function drawMiniGraph(canvas, chart) {
      if (!canvas) return;
      const { history } = computeProgress(chart);
      const ctx = canvas.getContext('2d');
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      const ratio = window.devicePixelRatio || 1;
      canvas.width = w * ratio;
      canvas.height = h * ratio;
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      ctx.clearRect(0, 0, w, h);

      const p = 10;
      const gw = w - p * 2;
      const gh = h - p * 2;
      const accentRgb = getComputedStyle(document.documentElement).getPropertyValue('--accent-rgb').trim() || '43, 109, 255';
      ctx.strokeStyle = `rgba(${accentRgb}, .25)`;
      ctx.lineWidth = 1;
      ctx.strokeRect(p, p, gw, gh);

      const gradient = ctx.createLinearGradient(0, p, 0, h - p);
      gradient.addColorStop(0, `rgba(${accentRgb}, .35)`);
      gradient.addColorStop(1, `rgba(${accentRgb}, .04)`);

      const points = [{ remaining: chart.total }, ...(history.length ? history : [])];
      ctx.beginPath();
      ctx.moveTo(p, p);
      points.forEach((point, i) => {
        if (i === 0) return;
        const x = p + (gw * (i / Math.max(points.length - 1, 1)));
        const y = h - p - (gh * (point.remaining / Math.max(chart.total, 1)));
        ctx.lineTo(x, y);
      });
      ctx.strokeStyle = `rgba(${accentRgb}, .95)`;
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.lineTo(p + gw, h - p);
      ctx.lineTo(p, h - p);
      ctx.closePath();
      ctx.fillStyle = gradient;
      ctx.fill();
    }

    function showChart(id) {
      currentChart = charts.find((c) => c.id === id);
      if (!currentChart) return;

      document.getElementById('homeScreen').style.display = 'none';
      document.getElementById('chartScreen').style.display = 'block';
      document.getElementById('chartTitle').textContent = currentChart.name;
      selectedDate = new Date();
      calendarBase = new Date(selectedDate.getFullYear(), selectedDate.getMonth(), 1);
      updateChartUI();
    }

    function closeChart() {
      currentChart = null;
      document.getElementById('chartScreen').style.display = 'none';
      document.getElementById('homeScreen').style.display = 'block';
      renderList();
    }

    function updateChartUI() {
      if (!currentChart) return;
      if (sanitizeFutureRecords(currentChart)) {
        saveLocalData();
        saveCloudData();
      }

      const { done, history } = computeProgress(currentChart);
      const remain = Math.max(0, currentChart.total - done);
      const deadline = new Date(currentChart.deadline);
      const today = new Date();
      const daysLeft = Math.max(0, Math.ceil((deadline - today) / 86400000));
      const daily = daysLeft > 0 ? Math.ceil(remain / daysLeft) : remain;
      const progress = currentChart.total ? Math.round((done / currentChart.total) * 100) : 0;

      document.getElementById('graphInfo').textContent = `${currentChart.total}${currentChart.unit} / 残り ${remain}${currentChart.unit}`;
      document.getElementById('dailyNeed').textContent = daily;
      document.getElementById('dailyUnit').textContent = currentChart.unit;
      document.getElementById('remainText').textContent = `あと${daysLeft}日 ・ 残り${remain}${currentChart.unit}`;
      document.getElementById('progressValue').textContent = `${progress}%`;
      document.getElementById('progressSub').textContent = `${done}/${currentChart.total}${currentChart.unit}`;
      document.getElementById('recordUnit').textContent = currentChart.unit;

      drawGraph(currentChart, history);
      renderCalendar();
      loadRecord();
    }

    function drawGraph(chart, history) {
      const canvas = document.getElementById('chartCanvas');
      const ctx = canvas.getContext('2d');
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      const ratio = window.devicePixelRatio || 1;

      canvas.width = w * ratio;
      canvas.height = h * ratio;
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);

      ctx.clearRect(0, 0, w, h);

      const p = 28;
      const gw = w - p * 2;
      const gh = h - p * 2;
      const startDate = normalizeDay(chart.createdAt);
      const endDate = new Date(chart.deadline);
      const spanDays = Math.max(1, Math.ceil((endDate - startDate) / 86400000));

      // axis
      ctx.strokeStyle = 'rgba(100,132,192,0.85)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(p, p);
      ctx.lineTo(p, h - p);
      ctx.lineTo(w - p, h - p);
      ctx.stroke();

      // ideal line
      ctx.setLineDash([6, 6]);
      ctx.strokeStyle = 'rgba(110,153,244,0.58)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(p, p);
      ctx.lineTo(w - p, h - p);
      ctx.stroke();
      ctx.setLineDash([]);

      // actual line (always starts at top-left)
      {
        const accentRgb = getComputedStyle(document.documentElement)
          .getPropertyValue('--accent-rgb')
          .trim() || '43, 109, 255';
        const plotPoints = [{ date: chart.createdAt, remaining: chart.total }, ...history];
        ctx.strokeStyle = `rgba(${accentRgb}, 0.95)`;
        ctx.lineWidth = 2.4;
        ctx.beginPath();
        ctx.moveTo(p, p);
        plotPoints.forEach((point, i) => {
          if (i === 0) return;
          const d = normalizeDay(point.date);
          const passed = Math.max(0, Math.min(spanDays, dayDiff(d, startDate)));
          const adjustedPassed = passed === 0 ? 0.5 : passed;
          const x = p + (gw * adjustedPassed / spanDays);
          const y = h - p - (gh * (point.remaining / Math.max(chart.total, 1)));
          ctx.lineTo(x, y);
        });

        ctx.stroke();
      }

      // y labels
      ctx.fillStyle = 'rgba(92,120,170,0.95)';
      ctx.font = '11px sans-serif';
      ctx.textAlign = 'right';
      for (let i = 0; i <= 5; i++) {
        const y = p + (gh * i / 5);
        const val = Math.round(chart.total - chart.total * i / 5);
        ctx.fillText(val.toLocaleString(), p - 6, y + 3);
      }

      // x labels
      ctx.textAlign = 'center';
      for (let i = 0; i <= 5; i++) {
        const d = new Date(startDate);
        d.setDate(d.getDate() + Math.round((spanDays / 5) * i));
        const x = p + (gw * i / 5);
        ctx.fillText(`${d.getMonth() + 1}/${d.getDate()}`, x, h - 7);
      }
    }

    function renderCalendar() {
      document.getElementById('monthLabel').textContent = `${calendarBase.getFullYear()}年${calendarBase.getMonth() + 1}月`;

      const weekRow = document.getElementById('weekRow');
      if (!weekRow.innerHTML) {
        weekRow.innerHTML = weekLabels.map((w) => `<div>${w}</div>`).join('');
      }

      const grid = document.getElementById('dayGrid');
      grid.innerHTML = '';
      const first = new Date(calendarBase.getFullYear(), calendarBase.getMonth(), 1);
      const start = new Date(first);
      start.setDate(first.getDate() - first.getDay());

      for (let i = 0; i < 42; i++) {
        const d = new Date(start);
        d.setDate(start.getDate() + i);
        const today = normalizeDay(new Date());
        const isFuture = normalizeDay(d) > today;

        const btn = document.createElement('button');
        btn.className = 'day-btn';
        if (d.getMonth() !== calendarBase.getMonth()) btn.classList.add('other');
        if (isFuture) btn.classList.add('future');
        if (formatKey(d) === formatKey(selectedDate)) btn.classList.add('active');
        btn.textContent = d.getDate();
        btn.disabled = isFuture;

        btn.onclick = () => {
          selectedDate = d;
          if (d.getMonth() !== calendarBase.getMonth()) {
            calendarBase = new Date(d.getFullYear(), d.getMonth(), 1);
          }
          renderCalendar();
          loadRecord();
        };

        grid.appendChild(btn);
      }
    }

    function changeMonth(offset) {
      calendarBase.setMonth(calendarBase.getMonth() + offset);
      renderCalendar();
    }

    function loadRecord() {
      if (!currentChart) return;
      const key = formatKey(selectedDate);
      const rec = currentChart.records[key] || { amount: 0, memo: '' };
      const isFuture = key > todayKey();
      document.getElementById('recordLabel').textContent = `${formatJa(selectedDate)}の成果`;
      document.getElementById('recordInput').value = rec.amount || 0;
      document.getElementById('memoInput').value = rec.memo || '';
      document.getElementById('recordInput').disabled = isFuture;
      document.getElementById('memoInput').disabled = isFuture;
      document.querySelector('#calendarCard .save').disabled = isFuture;
      if (isFuture) {
        document.getElementById('recordLabel').textContent = `${formatJa(selectedDate)}は未来日のため記録できません`;
      }
    }

    function saveRecord() {
      if (!currentChart) return;
      const key = formatKey(selectedDate);
      if (dayDiff(selectedDate, new Date()) > 0 || key > todayKey()) {
        alert('未来の日付には記録できません');
        return;
      }
      const amount = Math.max(0, Number(document.getElementById('recordInput').value) || 0);
      const memo = document.getElementById('memoInput').value.trim();
      if (amount === 0 && !memo) {
        delete currentChart.records[key];
      } else {
        currentChart.records[key] = { amount, memo };
      }
      saveLocalData();
      saveCloudData();
      updateChartUI();
    }

    function openEditModal() {
      if (!currentChart) return;
      document.getElementById('editName').value = currentChart.name;
      document.getElementById('editDeadline').value = currentChart.deadline;
      document.getElementById('editTotal').value = currentChart.total;
      document.getElementById('editModal').style.display = 'flex';
    }

    function closeEditModal() {
      document.getElementById('editModal').style.display = 'none';
    }

    function saveEdit() {
      if (!currentChart) return;
      const name = document.getElementById('editName').value.trim();
      const deadline = document.getElementById('editDeadline').value;
      const total = Number(document.getElementById('editTotal').value);

      if (!name || !deadline || !total) {
        alert('入力を確認してください');
        return;
      }

      currentChart.name = name;
      currentChart.deadline = deadline;
      currentChart.total = total;
      saveLocalData();
      saveCloudData();
      closeEditModal();
      updateChartUI();
    }

    function deleteChart() {
      if (!currentChart) return;
      if (!confirm('削除しますか？')) return;
      charts = charts.filter((c) => c.id !== currentChart.id);
      saveLocalData();
      saveCloudData();
      closeEditModal();
      closeChart();
    }

    function switchChartWithAnimation(targetId, direction) {
      if (isSwitchingChart) return;
      const screen = document.getElementById('chartScreen');
      const outClass = direction > 0 ? 'chart-switch-out-left' : 'chart-switch-out-right';
      const inClass = direction > 0 ? 'chart-switch-in-left' : 'chart-switch-in-right';
      isSwitchingChart = true;
      screen.classList.add(outClass);
      setTimeout(() => {
        screen.classList.remove(outClass);
        showChart(targetId);
        screen.classList.add(inClass);
        setTimeout(() => {
          screen.classList.remove(inClass);
          isSwitchingChart = false;
        }, 240);
      }, 200);
    }

    function showSiblingChart(direction) {
      if (!currentChart || charts.length < 2 || isSwitchingChart) return;
      const idx = charts.findIndex((c) => c.id === currentChart.id);
      if (idx < 0) return;
      const next = idx + direction;
      if (next < 0 || next >= charts.length) return;
      switchChartWithAnimation(charts[next].id, direction);
    }

    const chartScreen = document.getElementById('chartScreen');

    chartScreen.addEventListener('touchstart', (e) => {
      if (e.target.closest('button, input, textarea, select, #calendarCard')) return;
      const touch = e.changedTouches[0];
      swipeStartX = touch.clientX;
      swipeStartY = touch.clientY;
    }, { passive: true });

    chartScreen.addEventListener('touchend', (e) => {
      if (swipeStartX === null) return;
      const touch = e.changedTouches[0];
      const dx = touch.clientX - swipeStartX;
      const dy = touch.clientY - swipeStartY;
      swipeStartX = null;
      swipeStartY = null;
      if (Math.abs(dx) < 40 || Math.abs(dx) < Math.abs(dy) * 1.1) return;
      showSiblingChart(dx < 0 ? 1 : -1);
    }, { passive: true });

    const calendarCard = document.getElementById('calendarCard');
    calendarCard.addEventListener('touchstart', (e) => {
      const touch = e.changedTouches[0];
      calendarSwipeStartX = touch.clientX;
      calendarSwipeStartY = touch.clientY;
    }, { passive: true });

    calendarCard.addEventListener('touchend', (e) => {
      if (calendarSwipeStartX === null) return;
      const touch = e.changedTouches[0];
      const dx = touch.clientX - calendarSwipeStartX;
      const dy = touch.clientY - calendarSwipeStartY;
      calendarSwipeStartX = null;
      calendarSwipeStartY = null;
      if (Math.abs(dx) < 45 || Math.abs(dx) < Math.abs(dy) * 1.1) return;
      changeMonth(dx < 0 ? 1 : -1);
    }, { passive: true });

    window.addEventListener('resize', () => {
      if (!currentChart) return;
      const { history } = computeProgress(currentChart);
      drawGraph(currentChart, history);
    });


    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      installPromptEvent = e;
      document.getElementById('installBtn').style.display = 'inline-block';
    });

    window.addEventListener('appinstalled', () => {
      installPromptEvent = null;
      document.getElementById('installBtn').style.display = 'none';
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch((err) => {
          console.warn('service worker register failed', err);
        });
      });
    }

    document.getElementById('createModal').addEventListener('click', (e) => {
      if (e.target.id === 'createModal') closeCreateModal();
    });
    document.getElementById('editModal').addEventListener('click', (e) => {
      if (e.target.id === 'editModal') closeEditModal();
    });
    const settingsModal = document.getElementById('settingsModal');
    settingsModal.addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeSettingsModal();
    });
    settingsModal.addEventListener('pointerdown', (e) => {
      if (e.target === e.currentTarget) closeSettingsModal();
    });
    settingsModal.addEventListener('touchstart', (e) => {
      if (e.target === e.currentTarget) closeSettingsModal();
    });

    renderThemeButtons();
    renderList();
    initFirebaseAuth();
  </script>
</body>
</html>
