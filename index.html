<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Anulis Pro - 学習集計</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        :root {
            --primary-color: #0070bc;
            --accent-color: #00c6ff;
            --sunday-color: #eb4d4b;
            --saturday-color: #30336b;
            --text-main: #2d3436;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --card-bg: rgba(255, 255, 255, 0.9);
            --shadow: 0 8px 30px rgba(0,0,0,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, "Hiragino Sans", sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            overflow: hidden;
            height: 100vh;
        }

        /* --- ホーム一覧画面 --- */
        #homeView {
            height: 100vh; overflow-y: auto; padding: 60px 20px 120px;
            transition: opacity 0.4s;
        }
        .glass-header {
            position: fixed; top: 0; left: 0; right: 0; height: 60px;
            background: rgba(255,255,255,0.7); backdrop-filter: blur(10px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; z-index: 500;
        }
        .logo { font-size: 22px; font-weight: 900; color: var(--primary-color); letter-spacing: -1px; }

        .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .chart-card {
            background: var(--card-bg); border-radius: 24px; padding: 20px;
            box-shadow: var(--shadow); border: 1px solid rgba(255,255,255,0.6);
            cursor: pointer; transition: transform 0.2s;
        }
        .chart-card:active { transform: scale(0.95); }
        .chart-card h3 { font-size: 14px; margin-bottom: 10px; height: 3em; overflow: hidden; }
        .mini-progress-bg { height: 6px; background: #eee; border-radius: 3px; overflow: hidden; }
        .mini-progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary-color), var(--accent-color)); transition: width 0.8s; }

        /* --- 詳細スナップ画面 --- */
        #detailView { display: none; position: fixed; inset: 0; background: #fff; z-index: 1000; }
        .snap-x-wrap { display: flex; overflow-x: scroll; scroll-snap-type: x mandatory; width: 100vw; height: 100vh; }
        .snap-x-wrap::-webkit-scrollbar { display: none; }

        .full-page {
            min-width: 100vw; height: 100vh; scroll-snap-align: start;
            display: flex; flex-direction: column; overflow-y: scroll; scroll-snap-type: y mandatory;
        }
        .full-page::-webkit-scrollbar { display: none; }

        /* グラフセクション (再現UI) */
        .section-graph {
            min-height: 40vh; height: 40vh; scroll-snap-align: start;
            padding: 60px 20px 10px; background: white; border-bottom: 1px solid #f0f0f0;
            display: flex; flex-direction: column;
        }
        .graph-container { flex: 1; position: relative; }

        /* カレンダー・記録セクション (再現UI) */
        .section-record {
            min-height: 100vh; scroll-snap-align: start;
            background: #f8fafd; padding: 30px 15px 120px;
        }

        .back-btn {
            position: fixed; top: 40px; left: 15px; z-index: 1500;
            width: 40px; height: 40px; border-radius: 50%; background: rgba(0,0,0,0.05);
            border: none; font-size: 20px; cursor: pointer;
        }

        /* カレンダー本体 */
        .cal-box { background: white; border-radius: 20px; padding: 20px; box-shadow: var(--shadow); }
        .cal-title { text-align: center; font-weight: 800; margin-bottom: 15px; color: var(--primary-color); }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; text-align: center; }
        .cal-h { font-size: 10px; color: #aaa; font-weight: bold; padding-bottom: 5px; }
        .cal-d {
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
            border-radius: 50%; font-size: 13px; position: relative; cursor: pointer;
        }
        .cal-d.today { border: 1.5px solid var(--primary-color); color: var(--primary-color); font-weight: bold; border-radius: 8px; }
        .cal-d.selected { background: var(--primary-color) !important; color: white !important; border: none; }
        .cal-d.has-val::after {
            content: ''; position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%);
            width: 4px; height: 4px; background: var(--accent-color); border-radius: 50%;
        }

        /* 記録入力 */
        .input-card {
            background: white; border-radius: 20px; padding: 20px; margin-top: 20px;
            box-shadow: var(--shadow);
        }
        .input-group { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
        input[type="number"], input[type="text"], input[type="date"] {
            flex: 1; border: 1.5px solid #eee; padding: 12px; border-radius: 12px;
            font-size: 16px; outline: none; transition: border-color 0.3s;
        }
        input:focus { border-color: var(--accent-color); }
        .btn-save {
            background: var(--primary-color); color: white; border: none;
            padding: 12px 20px; border-radius: 12px; font-weight: bold; cursor: pointer;
        }

        /* 下部ナビ (ホーム) */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; height: 80px;
            background: rgba(255,255,255,0.8); backdrop-filter: blur(15px);
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid rgba(0,0,0,0.05); z-index: 400;
        }
        .nav-item { font-size: 24px; color: #ccc; cursor: pointer; }
        .nav-item.active { color: var(--primary-color); }

        /* モーダル */
        .modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
            backdrop-filter: blur(8px); z-index: 2000; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-content {
            background: white; width: 100%; max-width: 400px; border-radius: 30px;
            padding: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }

        /* アニメーション */
        @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .chart-card { animation: slideIn 0.4s ease forwards; }
    </style>
</head>
<body>

    <div id="homeView">
        <div class="glass-header">
            <div class="logo">Anulis Pro</div>
            <div style="display:flex; gap:10px;">
                <button onclick="openModal()" style="background:var(--accent-color); color:white; border:none; width:36px; height:36px; border-radius:10px; font-size:20px;">＋</button>
            </div>
        </div>
        
        <div id="summaryCard" style="background:var(--card-bg); padding:20px; border-radius:24px; margin-bottom:20px; margin-top:10px;">
            <p style="font-size:12px; color:#999;">全体の進捗状況</p>
            <h2 id="totalPercText" style="font-size:28px; font-weight:900; color:var(--primary-color);">0%</h2>
        </div>

        <div class="chart-grid" id="chartGrid"></div>
    </div>

    <div id="detailView">
        <button class="back-btn" onclick="closeDetail()">✕</button>
        <div class="snap-x-wrap" id="detailContainer"></div>
    </div>

    <div class="modal-overlay" id="createModal">
        <div class="modal-content">
            <h2 style="margin-bottom:20px;">新規ペースメーカー</h2>
            <input type="text" id="m_name" placeholder="教材名 (例: 数学 青チャート)" style="width:100%; margin-bottom:15px;">
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <div style="flex:1">
                    <p style="font-size:11px; color:#999;">目標期日</p>
                    <input type="date" id="m_date" style="width:100%">
                </div>
            </div>
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <div style="flex:2">
                    <p style="font-size:11px; color:#999;">総数</p>
                    <input type="number" id="m_total" placeholder="300" style="width:100%">
                </div>
                <div style="flex:1">
                    <p style="font-size:11px; color:#999;">単位</p>
                    <select id="m_unit" style="width:100%; padding:12px; border-radius:12px; border:1.5px solid #eee;">
                        <option>問</option><option>ページ</option><option>章</option>
                    </select>
                </div>
            </div>
            <button class="btn-save" style="width:100%; padding:15px; font-size:16px;" onclick="addChart()">作成する</button>
            <button onclick="closeModal()" style="width:100%; border:none; background:none; color:#ccc; margin-top:15px;">キャンセル</button>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active">●</div>
        <div class="nav-item" onclick="alert('設定機能は準備中')">⚙</div>
        <div class="nav-item" onclick="alert('カレンダー同期は準備中')">📅</div>
    </div>

    <script>
        // --- データ管理 ---
        let charts = JSON.parse(localStorage.getItem('anulis_v7_master')) || [];
        let chartInstances = {};
        const todayStr = new Date().toISOString().split('T')[0];

        // --- 初期化 ---
        window.onload = () => {
            renderHome();
            // EmailJS初期化（必要に応じてUserIDを差し替え）
            emailjs.init("user_xxxxxxxxxxxx"); 
        };

        function save() { localStorage.setItem('anulis_v7_master', JSON.stringify(charts)); }

        function openModal() { document.getElementById('createModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('createModal').style.display = 'none'; }

        function addChart() {
            const name = document.getElementById('m_name').value;
            const date = document.getElementById('m_date').value;
            const total = parseInt(document.getElementById('m_total').value);
            const unit = document.getElementById('m_unit').value;
            if(!name || !date || isNaN(total)) return alert("入力が足りません");

            const newC = {
                id: 'c' + Date.now(),
                name, deadline: date, total, unit,
                createdAt: todayStr,
                records: { [todayStr]: 0 }
            };
            charts.push(newC);
            save(); renderHome(); closeModal();
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
        }

        function renderHome() {
            const grid = document.getElementById('chartGrid');
            grid.innerHTML = '';
            let sumP = 0;

            charts.forEach((c, idx) => {
                const latest = c.records[Object.keys(c.records).sort().pop()] || 0;
                const perc = Math.min(100, Math.round((latest / c.total) * 100));
                sumP += perc;

                const card = document.createElement('div');
                card.className = 'chart-card';
                card.style.animationDelay = `${idx * 0.05}s`;
                card.onclick = () => openDetail(c.id);
                card.innerHTML = `
                    <h3>${c.name}</h3>
                    <p style="font-size:11px; color:#999; margin-bottom:5px;">${perc}% 完了</p>
                    <div class="mini-progress-bg"><div class="mini-progress-fill" style="width:${perc}%"></div></div>
                `;
                grid.appendChild(card);
            });

            const avg = charts.length ? Math.round(sumP / charts.length) : 0;
            document.getElementById('totalPercText').innerText = `${avg}%`;
        }

        // --- 詳細画面 (スナップ) ---
        function openDetail(targetId) {
            const container = document.getElementById('detailContainer');
            container.innerHTML = '';
            document.getElementById('detailView').style.display = 'block';

            charts.forEach(c => {
                const page = document.createElement('div');
                page.className = 'full-page';
                page.id = `page-${c.id}`;
                page.innerHTML = `
                    <div class="section-graph">
                        <h2 style="font-size:16px; text-align:center; margin-bottom:15px;">${c.name}</h2>
                        <div class="graph-container"><canvas id="canvas-${c.id}"></canvas></div>
                        <p id="advice-${c.id}" style="font-size:11px; color:#999; text-align:center; margin-top:10px;"></p>
                    </div>
                    <div class="section-record">
                        <div class="cal-box">
                            <div class="cal-title">${new Date().getMonth()+1}月</div>
                            <div class="cal-grid" id="grid-${c.id}"></div>
                        </div>
                        <div class="input-card">
                            <p id="label-${c.id}" style="font-size:13px; font-weight:bold; color:var(--primary-color);">日付を選択してください</p>
                            <div class="input-group">
                                <input type="number" id="input-${c.id}" placeholder="累計進捗を入力">
                                <span style="font-weight:bold;">${c.unit}</span>
                                <button class="btn-save" onclick="saveProgress('${c.id}')">保存</button>
                            </div>
                        </div>
                        <button onclick="deleteChart('${c.id}')" style="width:100%; margin-top:40px; border:none; background:none; color:#ff7675; font-size:12px;">このチャートを削除</button>
                    </div>
                `;
                container.appendChild(page);
                renderDetailGraph(c);
                renderDetailCal(c);
            });

            document.getElementById(`page-${targetId}`).scrollIntoView();
        }

        function closeDetail() { document.getElementById('detailView').style.display = 'none'; renderHome(); }

        function renderDetailGraph(c) {
            const ctx = document.getElementById(`canvas-${c.id}`).getContext('2d');
            const sortedDates = Object.keys(c.records).sort();
            const latest = c.records[sortedDates[sortedDates.length-1]] || 0;

            if(chartInstances[c.id]) chartInstances[c.id].destroy();
            chartInstances[c.id] = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['開始', '現在', '目標'],
                    datasets: [{
                        label: '実績(残り)',
                        data: [
                            {x:'開始', y:c.total},
                            {x:'現在', y:Math.max(0, c.total - latest)}
                        ],
                        borderColor: '#0070bc', backgroundColor: 'rgba(0,112,188,0.05)',
                        fill: true, tension: 0.1, borderWidth: 3, pointRadius: 5, pointBackgroundColor: '#fff'
                    }, {
                        label: '理想ペース',
                        data: [{x:'開始', y:c.total}, {x:'目標', y:0}],
                        borderColor: '#e0e0e0', borderDash: [5, 5], fill: false, pointRadius: 0
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { display: false }, ticks: { font: { size: 10 } } },
                        y: { beginAtZero: true, max: c.total, ticks: { font: { size: 9 }, color: '#ccc' } }
                    }
                }
            });

            // ペースアドバイス
            const remain = c.total - latest;
            const days = Math.ceil((new Date(c.deadline) - new Date()) / 86400000);
            const pace = days > 0 ? Math.ceil(remain / days) : remain;
            document.getElementById(`advice-${c.id}`).innerText = 
                remain > 0 ? `あと ${remain}${c.unit} / 1日目安: ${pace}${c.unit}` : "🎉 COMPLETE!";
        }

        function renderDetailCal(c) {
            const grid = document.getElementById(`grid-${c.id}`);
            grid.innerHTML = '';
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            const lastDay = new Date(year, month + 1, 0).getDate();
            const startDay = new Date(year, month, 1).getDay();

            ['日','月','火','水','木','金','土'].forEach(h => grid.innerHTML += `<div class="cal-h">${h}</div>`);
            for(let i=0; i<startDay; i++) grid.innerHTML += '<div></div>';

            for(let i=1; i<=lastDay; i++) {
                const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                const cell = document.createElement('div');
                cell.className = 'cal-d';
                if(ds === todayStr) cell.classList.add('today');
                if(c.records[ds] !== undefined) cell.classList.add('has-val');
                cell.textContent = i;
                cell.onclick = () => {
                    grid.querySelectorAll('.cal-d').forEach(d => d.classList.remove('selected'));
                    cell.classList.add('selected');
                    document.getElementById(`label-${c.id}`).innerText = `${month+1}月${i}日の累計を記録`;
                    document.getElementById(`input-${c.id}`).value = c.records[ds] || "";
                    document.getElementById(`input-${c.id}`).dataset.selected = ds;
                };
                grid.appendChild(cell);
            }
        }

        function saveProgress(id) {
            const input = document.getElementById(`input-${id}`);
            const ds = input.dataset.selected;
            if(!ds) return alert("日付をタップしてください");
            
            const val = parseInt(input.value) || 0;
            const c = charts.find(x => x.id === id);
            c.records[ds] = Math.min(c.total, val);
            
            save();
            renderDetailGraph(c);
            renderDetailCal(c);
            confetti({ particleCount: 40, spread: 60, origin: { y: 0.8 }, colors:['#00c6ff', '#0070bc'] });
        }

        function deleteChart(id) {
            if(!confirm("削除しますか？")) return;
            charts = charts.filter(x => x.id !== id);
            save(); closeDetail(); renderHome();
        }
    </script>
</body>
</html>
